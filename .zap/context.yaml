# ZAP scan context — defines target scope for DAST scanning
context:
  name: SeventySix
  urls:
    - https://localhost:4301
  includePaths:
    - https://localhost:4301.*
    - https://localhost:7274/api/.*
  excludePaths:
    - https://localhost:7274/health.*
    - https://localhost:7274/api/v1/auth/verify-admin
    - .*\.(js|css|png|jpg|svg|woff2|ico)$
