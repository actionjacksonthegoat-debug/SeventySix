name: Dependency Review

on:
    pull_request:
        branches: [master]

permissions:
    contents: read
    pull-requests: write

concurrency:
    group: depreview-${{ github.ref }}
    cancel-in-progress: true

jobs:
    dependency-review:
        name: Dependency Review
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Dependency Review
              uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
              env:
                  # Opt into Node.js 24 runtime early. v4.9.0 is the latest release and
                  # still targets Node 20; this env var eliminates the deprecation warning
                  # until the action publishes a Node 24-native build.
                  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
              with:
                  config-file: .github/dependency-review-config.yml
