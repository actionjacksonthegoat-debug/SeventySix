name: OpenSSF Scorecard

on:
  push:
    branches: [master]
  schedule:
    # Run weekly on Monday at 7:00 UTC (after CodeQL at 6:00)
    - cron: "0 7 * * 1"

permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      security-events: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run Scorecard Analysis
        id: scorecard
        # Tolerate transient GitHub GraphQL failures (e.g. ListCommits "E008" hiccups)
        # so a server-side blip does not fail the security scan workflow.
        continue-on-error: true
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Check SARIF results exist
        id: sarif_check
        shell: bash
        run: |
          if [ -s results.sarif ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Scorecard did not produce a results.sarif file (likely a transient GitHub API failure). Skipping SARIF upload."
          fi

      - name: Upload SARIF results
        if: steps.sarif_check.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        with:
          sarif_file: results.sarif
