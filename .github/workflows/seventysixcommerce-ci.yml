name: SeventySixCommerce CI

on:
    push:
        branches: [master]
        paths:
            - "ECommerce/seventysixcommerce-tanstack/**"
            - "ECommerce/seventysixcommerce-sveltekit/**"
            - "ECommerce/seventysixcommerce-shared/**"
            - ".github/workflows/seventysixcommerce-ci.yml"
    pull_request:
        branches: [master]
        paths:
            - "ECommerce/seventysixcommerce-tanstack/**"
            - "ECommerce/seventysixcommerce-sveltekit/**"
            - "ECommerce/seventysixcommerce-shared/**"
            - ".github/workflows/seventysixcommerce-ci.yml"
    workflow_dispatch:

permissions:
    contents: read

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
    group: seventysixcommerce-ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # ──────────────────────────────────────────────────────────
    # Stage 1: Commerce Apps — Typecheck + Test + Build (matrix)
    # ──────────────────────────────────────────────────────────
    commerce-build:
        name: ${{ matrix.name }}
        runs-on: ubuntu-latest
        timeout-minutes: 30

        permissions:
            contents: read

        strategy:
            matrix:
                include:
                    - app: tanstack
                      name: "TanStack Build & Test"
                      working-directory: ECommerce/seventysixcommerce-tanstack
                      pg-port: 5438
                      pg-user: SeventySixCommerce
                      pg-password: seventysixcommerce_ci
                      pg-db: SeventySixCommerce
                      database-url: postgresql://SeventySixCommerce:seventysixcommerce_ci@localhost:5438/SeventySixCommerce
                      codecov-flag: seventysixcommerce-tanstack
                    - app: sveltekit
                      name: "SvelteKit Build & Test"
                      working-directory: ECommerce/seventysixcommerce-sveltekit
                      pg-port: 5439
                      pg-user: test_user
                      pg-password: test_password
                      pg-db: seventysixcommerce_sveltekit_test
                      database-url: postgresql://test_user:test_password@localhost:5439/seventysixcommerce_sveltekit_test
                      codecov-flag: seventysixcommerce-sveltekit

        defaults:
            run:
                working-directory: ${{ matrix.working-directory }}

        services:
            postgres:
                image: postgres:17-alpine
                env:
                    POSTGRES_USER: ${{ matrix.pg-user }}
                    POSTGRES_PASSWORD: ${{ matrix.pg-password }}
                    POSTGRES_DB: ${{ matrix.pg-db }}
                ports:
                    - ${{ matrix.pg-port }}:5432
                options: >-
                    --health-cmd "pg_isready -U ${{ matrix.pg-user }}"
                    --health-interval 5s
                    --health-timeout 3s
                    --health-retries 5

        env:
            DATABASE_URL: ${{ matrix.database-url }}
            MOCK_SERVICES: "true"

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version: "24.x"
                  cache: "npm"
                  cache-dependency-path: |
                      ECommerce/seventysixcommerce-shared/package-lock.json
                      ${{ matrix.working-directory }}/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Link shared module resolution to app dependencies
              run: node ../../scripts/link-commerce-shared-node-modules.mjs --app ${{ matrix.app }}

            - name: Build (TanStack)
              if: matrix.app == 'tanstack'
              run: npm run build

            - name: Typecheck (TanStack)
              if: matrix.app == 'tanstack'
              run: npx tsc --noEmit

            - name: Svelte Check (SvelteKit)
              if: matrix.app == 'sveltekit'
              run: npm run check

            - name: Test with coverage
              run: npx vitest run --coverage

            - name: Build (SvelteKit)
              if: matrix.app == 'sveltekit'
              run: npm run build
              env:
                  DATABASE_URL: ${{ matrix.database-url }}

            - name: Upload coverage
              if: always()
              uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  flags: ${{ matrix.codecov-flag }}
                  directory: ${{ matrix.working-directory }}/coverage
                  fail_ci_if_error: true

    # ──────────────────────────────────────────────────────────
    # Stage 2: SvelteKit E2E Tests
    # ──────────────────────────────────────────────────────────
    e2e-sveltekit:
        name: SvelteKit E2E Tests
        runs-on: ubuntu-latest
        timeout-minutes: 30
        needs: [commerce-build]

        permissions:
            contents: read

        defaults:
            run:
                working-directory: ECommerce/seventysixcommerce-sveltekit

        services:
            postgres:
                image: postgres:17-alpine
                env:
                    POSTGRES_USER: ssxc_e2e
                    POSTGRES_PASSWORD: ssxc_e2e_password
                    POSTGRES_DB: seventysixcommerce_sveltekit_e2e
                ports:
                    - 5440:5432
                options: >-
                    --health-cmd "pg_isready -U ssxc_e2e -d seventysixcommerce_sveltekit_e2e"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version: "24.x"

            - name: Install dependencies
              run: npm ci

            - name: Link shared module resolution to app dependencies
              run: node ../../scripts/link-commerce-shared-node-modules.mjs --app sveltekit

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium

            - name: Build application
              run: npm run build
              env:
                  DATABASE_URL: postgresql://ssxc_e2e:ssxc_e2e_password@localhost:5440/seventysixcommerce_sveltekit_e2e

            - name: Run database migrations
              run: npm run db:migrate
              env:
                  DATABASE_URL: postgresql://ssxc_e2e:ssxc_e2e_password@localhost:5440/seventysixcommerce_sveltekit_e2e

            - name: Start application
              run: node build &
              env:
                  DATABASE_URL: postgresql://ssxc_e2e:ssxc_e2e_password@localhost:5440/seventysixcommerce_sveltekit_e2e
                  PORT: "3011"
                  NODE_ENV: production

            - name: Wait for application to be ready
              run: |
                  for i in $(seq 1 30); do
                      if curl -sf http://localhost:3011/healthz > /dev/null 2>&1; then
                          echo "Application is ready"
                          exit 0
                      fi
                      echo "Attempt $i/30 — waiting..."
                      sleep 2
                  done
                  echo "Application failed to start within 60 seconds"
                  exit 1

            - name: Run E2E tests
              run: npx playwright test
              env:
                  DATABASE_URL: postgresql://ssxc_e2e:ssxc_e2e_password@localhost:5440/seventysixcommerce_sveltekit_e2e
                  CI: "true"

            - name: Upload Playwright report
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
              if: always()
              with:
                  name: sveltekit-playwright-report
                  path: ECommerce/seventysixcommerce-sveltekit/playwright-report/
                  retention-days: 14

            - name: Upload test results
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
              if: always()
              with:
                  name: sveltekit-test-results
                  path: ECommerce/seventysixcommerce-sveltekit/test-results/
                  if-no-files-found: ignore
                  retention-days: 7

    # ──────────────────────────────────────────────────────────
    # Stage 2: TanStack E2E Tests
    # ──────────────────────────────────────────────────────────
    e2e-tanstack:
        name: TanStack E2E Tests
        runs-on: ubuntu-latest
        timeout-minutes: 30
        needs: [commerce-build]

        permissions:
            contents: read

        defaults:
            run:
                working-directory: ECommerce/seventysixcommerce-tanstack

        services:
            postgres:
                image: postgres:17-alpine
                env:
                    POSTGRES_USER: ssxc_e2e
                    POSTGRES_PASSWORD: ssxc_e2e_password
                    POSTGRES_DB: seventysixcommerce_tanstack_e2e
                ports:
                    - 5441:5432
                options: >-
                    --health-cmd "pg_isready -U ssxc_e2e -d seventysixcommerce_tanstack_e2e"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version: "24.x"

            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Link shared module resolution to app dependencies
              run: node ../../scripts/link-commerce-shared-node-modules.mjs --app tanstack

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium

            - name: Build application
              run: npm run build
              env:
                  DATABASE_URL: postgresql://ssxc_e2e:ssxc_e2e_password@localhost:5441/seventysixcommerce_tanstack_e2e

            - name: Run database migrations
              run: npm run db:migrate
              env:
                  DATABASE_URL: postgresql://ssxc_e2e:ssxc_e2e_password@localhost:5441/seventysixcommerce_tanstack_e2e

            - name: Start application
              run: |
                  node server-entry.mjs > /tmp/tanstack-e2e.log 2>&1 &
                  echo $! > /tmp/tanstack-e2e.pid
              env:
                  DATABASE_URL: postgresql://ssxc_e2e:ssxc_e2e_password@localhost:5441/seventysixcommerce_tanstack_e2e
                  PORT: "3012"
                  NODE_ENV: production

            - name: Wait for application to be ready
              run: |
                for i in $(seq 1 60); do
                  if curl -sf http://localhost:3012/api/healthz > /dev/null 2>&1; then
                    echo "Application is ready"
                    exit 0
                  fi

                  if [ -f /tmp/tanstack-e2e.pid ] && ! kill -0 "$(cat /tmp/tanstack-e2e.pid)" 2>/dev/null; then
                    echo "Application process exited early"
                    echo "=== TanStack startup logs (E2E) ==="
                    if [ -f /tmp/tanstack-e2e.log ]; then
                      tail -n 200 /tmp/tanstack-e2e.log
                    fi
                    exit 1
                  fi

                  echo "Attempt $i/60 — waiting..."
                  sleep 2
                done

                echo "Application failed to start within 120 seconds"
                echo "=== TanStack startup logs (E2E) ==="
                if [ -f /tmp/tanstack-e2e.log ]; then
                  tail -n 200 /tmp/tanstack-e2e.log
                fi
                if [ -f /tmp/tanstack-e2e.pid ]; then
                  echo "PID: $(cat /tmp/tanstack-e2e.pid)"
                fi
                  exit 1

            - name: Run E2E tests
              run: npx playwright test
              env:
                  DATABASE_URL: postgresql://ssxc_e2e:ssxc_e2e_password@localhost:5441/seventysixcommerce_tanstack_e2e
                  CI: "true"

            - name: Upload Playwright report
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
              if: always()
              with:
                  name: tanstack-playwright-report
                  path: ECommerce/seventysixcommerce-tanstack/playwright-report/
                  retention-days: 14

            - name: Upload test results
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
              if: always()
              with:
                  name: tanstack-test-results
                  path: ECommerce/seventysixcommerce-tanstack/test-results/
                  if-no-files-found: ignore
                  retention-days: 7

    # ──────────────────────────────────────────────────────────
    # Stage 2: SvelteKit Load Tests
    # ──────────────────────────────────────────────────────────
    loadtest-sveltekit:
        name: SvelteKit Load Tests
        runs-on: ubuntu-latest
        timeout-minutes: 30
        needs: [commerce-build]

        permissions:
            contents: read

        defaults:
            run:
                working-directory: ECommerce/seventysixcommerce-sveltekit

        services:
            postgres:
                image: postgres:18-alpine
                env:
                    POSTGRES_USER: ssxc_loadtest
                    POSTGRES_PASSWORD: ssxc_loadtest_password
                    POSTGRES_DB: seventysixcommerce_sveltekit_loadtest
                    PGDATA: /var/lib/postgresql/data
                ports:
                    - 5442:5432
                options: >-
                    --health-cmd "pg_isready -U ssxc_loadtest -d seventysixcommerce_sveltekit_loadtest"
                    --health-interval 5s
                    --health-timeout 3s
                    --health-retries 5

        env:
            DATABASE_URL: postgresql://ssxc_loadtest:ssxc_loadtest_password@localhost:5442/seventysixcommerce_sveltekit_loadtest

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version: "24.x"

            - name: Install dependencies
              run: npm ci

            - name: Link shared module resolution to app dependencies
              run: node ../../scripts/link-commerce-shared-node-modules.mjs --app sveltekit

            - name: Build application
              run: npm run build

            - name: Run database migrations and seed
              run: |
                  npx drizzle-kit push --force
                  npx tsx src/lib/server/db/seed.ts

            - name: Start application
              run: node build &
              env:
                  PORT: "3021"
                  NODE_ENV: production
                  MOCK_SERVICES: "true"

            - name: Wait for application to be ready
              run: |
                  for i in $(seq 1 30); do
                      if curl -sf http://localhost:3021/healthz > /dev/null 2>&1; then
                          echo "Application is ready"
                          exit 0
                      fi
                      echo "Attempt $i/30 — waiting..."
                      sleep 2
                  done
                  echo "Application failed to start within 60 seconds"
                  exit 1

            - name: Install k6
              run: |
                  curl -sS https://dl.k6.io/key.gpg | sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --import
                  echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
                  sudo apt-get update && sudo apt-get install k6

            - name: Run load tests (quick profile)
              run: |
                  for scenario in load-testing/scenarios/**/*.test.js; do
                      echo "Running: $scenario"
                      k6 run --config load-testing/config/quick.json "$scenario"
                  done

            - name: Upload load test report
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
              if: always()
              with:
                  name: sveltekit-load-test-report
                  path: |
                      ECommerce/seventysixcommerce-sveltekit/load-testing/results/
                      ECommerce/seventysixcommerce-sveltekit/load-testing/reports/
                  if-no-files-found: ignore
                  retention-days: 7

    # ──────────────────────────────────────────────────────────
    # Stage 2: TanStack Load Tests
    # ──────────────────────────────────────────────────────────
    loadtest-tanstack:
        name: TanStack Load Tests
        runs-on: ubuntu-latest
        timeout-minutes: 30
        needs: [commerce-build]

        permissions:
            contents: read

        defaults:
            run:
                working-directory: ECommerce/seventysixcommerce-tanstack

        services:
            postgres:
                image: postgres:18-alpine
                env:
                    POSTGRES_USER: ssxc_loadtest
                    POSTGRES_PASSWORD: ssxc_loadtest_password
                    POSTGRES_DB: seventysixcommerce_tanstack_loadtest
                    PGDATA: /var/lib/postgresql/data
                ports:
                    - 5443:5432
                options: >-
                    --health-cmd "pg_isready -U ssxc_loadtest -d seventysixcommerce_tanstack_loadtest"
                    --health-interval 5s
                    --health-timeout 3s
                    --health-retries 5

        env:
            DATABASE_URL: postgresql://ssxc_loadtest:ssxc_loadtest_password@localhost:5443/seventysixcommerce_tanstack_loadtest

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version: "24.x"

            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Link shared module resolution to app dependencies
              run: node ../../scripts/link-commerce-shared-node-modules.mjs --app tanstack

            - name: Build application
              run: npm run build

            - name: Run database migrations and seed
              run: |
                  npx drizzle-kit push --force
                  npx tsx src/server/db/seed.ts

            - name: Start application
              run: |
                  node server-entry.mjs > /tmp/tanstack-loadtest.log 2>&1 &
                  echo $! > /tmp/tanstack-loadtest.pid
              env:
                  PORT: "3022"
                  NODE_ENV: production
                  MOCK_SERVICES: "true"

            - name: Wait for application to be ready
              run: |
                for i in $(seq 1 60); do
                  if curl -sf http://localhost:3022/api/healthz > /dev/null 2>&1; then
                    echo "Application is ready"
                    exit 0
                  fi

                  if [ -f /tmp/tanstack-loadtest.pid ] && ! kill -0 "$(cat /tmp/tanstack-loadtest.pid)" 2>/dev/null; then
                    echo "Application process exited early"
                    echo "=== TanStack startup logs (Load Test) ==="
                    if [ -f /tmp/tanstack-loadtest.log ]; then
                      tail -n 200 /tmp/tanstack-loadtest.log
                    fi
                    exit 1
                  fi

                  echo "Attempt $i/60 — waiting..."
                  sleep 2
                done

                echo "Application failed to start within 120 seconds"
                echo "=== TanStack startup logs (Load Test) ==="
                if [ -f /tmp/tanstack-loadtest.log ]; then
                  tail -n 200 /tmp/tanstack-loadtest.log
                fi
                if [ -f /tmp/tanstack-loadtest.pid ]; then
                  echo "PID: $(cat /tmp/tanstack-loadtest.pid)"
                fi
                  exit 1

            - name: Install k6
              run: |
                  curl -sS https://dl.k6.io/key.gpg | sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --import
                  echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
                  sudo apt-get update && sudo apt-get install k6

            - name: Run load tests (quick profile)
              run: |
                  for scenario in load-testing/scenarios/**/*.test.js; do
                      echo "Running: $scenario"
                      k6 run --config load-testing/config/quick.json "$scenario"
                  done

            - name: Upload load test report
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
              if: always()
              with:
                  name: tanstack-load-test-report
                  path: |
                      ECommerce/seventysixcommerce-tanstack/load-testing/results/
                      ECommerce/seventysixcommerce-tanstack/load-testing/reports/
                  if-no-files-found: ignore
                  retention-days: 7

    # ──────────────────────────────────────────────────────────
    # Stage 3: Quality gate — all checks must pass
    # ──────────────────────────────────────────────────────────
    # NOTE: Add the following as required status checks in GitHub branch protection:
    # - "TanStack Build & Test" (commerce-build matrix entry)
    # - "SvelteKit Build & Test" (commerce-build matrix entry)
    # - "SvelteKit E2E Tests"
    # - "TanStack E2E Tests"
    # - "SeventySixCommerce Quality Gate"
    quality-gate:
        name: SeventySixCommerce Quality Gate
        needs: [commerce-build, e2e-sveltekit, e2e-tanstack, loadtest-sveltekit, loadtest-tanstack]
        runs-on: ubuntu-latest
        timeout-minutes: 15
        if: always()

        permissions:
            contents: read

        steps:
            - name: Evaluate gate results
              run: |
                  echo "============================================"
                  echo "  SeventySixCommerce Quality Gate Results"
                  echo "============================================"
                  echo ""

                  FAILED=0

                  check_job() {
                      local name="$1"
                      local result="$2"
                      if [ "$result" = "success" ]; then
                          printf "  %-30s PASSED\n" "$name"
                      else
                          printf "  %-30s FAILED (%s)\n" "$name" "$result"
                          FAILED=1
                      fi
                  }

                  check_job "Commerce Build & Test" "${{ needs.commerce-build.result }}"
                  check_job "SvelteKit E2E Tests" "${{ needs.e2e-sveltekit.result }}"
                  check_job "TanStack E2E Tests" "${{ needs.e2e-tanstack.result }}"
                  check_job "SvelteKit Load Tests" "${{ needs.loadtest-sveltekit.result }}"
                  check_job "TanStack Load Tests" "${{ needs.loadtest-tanstack.result }}"

                  echo ""
                  echo "============================================"

                  if [ "$FAILED" -eq 1 ]; then
                      echo "  Quality Gate: FAILED"
                      echo "============================================"
                      exit 1
                  fi

                  echo "  Quality Gate: PASSED"
                  echo "============================================"

    # ──────────────────────────────────────────────────────────
    # Stage 3: Build & publish Docker images (master push only)
    # ──────────────────────────────────────────────────────────
    publish:
        name: Publish SeventySixCommerce Docker Images
        needs: [quality-gate]
        runs-on: ubuntu-latest
        timeout-minutes: 30
        if: github.ref == 'refs/heads/master' && github.event_name == 'push' && needs.quality-gate.result == 'success'

        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

            - name: Log in to GHCR
              uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              run: |
                  echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
                  echo "date=$(date -u +%Y%m%d)" >> $GITHUB_OUTPUT

            - name: Build and push TanStack image
              uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
              with:
                  context: ./ECommerce
                  file: ./ECommerce/seventysixcommerce-tanstack/Dockerfile
                  platforms: linux/amd64
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/seventysixcommerce-tanstack:latest
                      ghcr.io/${{ github.repository_owner }}/seventysixcommerce-tanstack:${{ github.sha }}
                      ghcr.io/${{ github.repository_owner }}/seventysixcommerce-tanstack:${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha_short }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Generate SBOM for TanStack image
              uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
              with:
                  image: ghcr.io/${{ github.repository_owner }}/seventysixcommerce-tanstack:${{ github.sha }}
                  format: spdx-json
                  output-file: sbom-tanstack.spdx.json

            - name: Build and push SvelteKit image
              uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
              with:
                  context: ./ECommerce
                  file: ./ECommerce/seventysixcommerce-sveltekit/Dockerfile
                  platforms: linux/amd64
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/seventysixcommerce-sveltekit:latest
                      ghcr.io/${{ github.repository_owner }}/seventysixcommerce-sveltekit:${{ github.sha }}
                      ghcr.io/${{ github.repository_owner }}/seventysixcommerce-sveltekit:${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha_short }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Generate SBOM for SvelteKit image
              uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
              with:
                  image: ghcr.io/${{ github.repository_owner }}/seventysixcommerce-sveltekit:${{ github.sha }}
                  format: spdx-json
                  output-file: sbom-sveltekit.spdx.json

            - name: Upload SBOM artifacts
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
              with:
                  name: sbom-commerce-reports
                  path: |
                      sbom-tanstack.spdx.json
                      sbom-sveltekit.spdx.json
                  retention-days: 90

    # ──────────────────────────────────────────────────────────
    # Stage 4: Container vulnerability scans (after publish)
    # ──────────────────────────────────────────────────────────
    scan-tanstack-image:
        name: Scan TanStack Image
        needs: [publish]
        if: needs.publish.result == 'success'
        uses: ./.github/workflows/reusable-container-scan.yml
        with:
            image-ref: ghcr.io/${{ github.repository_owner }}/seventysixcommerce-tanstack:${{ github.sha }}
            image-name: seventysixcommerce-tanstack
        permissions:
            contents: read
            security-events: write

    scan-sveltekit-image:
        name: Scan SvelteKit Image
        needs: [publish]
        if: needs.publish.result == 'success'
        uses: ./.github/workflows/reusable-container-scan.yml
        with:
            image-ref: ghcr.io/${{ github.repository_owner }}/seventysixcommerce-sveltekit:${{ github.sha }}
            image-name: seventysixcommerce-sveltekit
        permissions:
            contents: read
            security-events: write
