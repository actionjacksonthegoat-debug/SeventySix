name: Deploy SeventySixCommerce

on:
    workflow_dispatch:
    workflow_run:
        workflows: [SeventySixCommerce CI]
        types: [completed]
        branches: [master]

permissions: {}

concurrency:
    group: deploy-seventysixcommerce
    cancel-in-progress: false

jobs:
    deploy-production:
        name: Deploy SeventySixCommerce to Production
        runs-on: ubuntu-latest
        timeout-minutes: 30
        environment: production
        if: >-
            github.event_name == 'workflow_dispatch' ||
            github.event.workflow_run.conclusion == 'success'

        steps:
            - name: Validate required secrets
              run: |
                  MISSING=""
                  for var in SSXC_DB_PASSWORD STRIPE_SECRET_KEY STRIPE_WEBHOOK_SECRET PRINTFUL_API_KEY BREVO_API_KEY; do
                      if [ -z "${!var}" ]; then
                          MISSING="$MISSING $var"
                      fi
                  done
                  if [ -n "$MISSING" ]; then
                      echo "::error::Missing required secrets:$MISSING"
                      exit 1
                  fi
                  echo "All required secrets are configured"
              env:
                  SSXC_DB_PASSWORD: ${{ secrets.SSXC_DB_PASSWORD }}
                  STRIPE_SECRET_KEY: ${{ secrets.SSXC_STRIPE_SECRET_KEY }}
                  STRIPE_WEBHOOK_SECRET: ${{ secrets.SSXC_STRIPE_WEBHOOK_SECRET }}
                  PRINTFUL_API_KEY: ${{ secrets.SSXC_PRINTFUL_API_KEY }}
                  BREVO_API_KEY: ${{ secrets.SSXC_BREVO_API_KEY }}

            - name: Deploy via SSH
              uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
              env:
                  GITHUB_OWNER: ${{ github.repository_owner }}
                  SSXC_DB_USER: ${{ vars.SSXC_DB_USER || 'SeventySixCommerce' }}
                  SSXC_DB_PASSWORD: ${{ secrets.SSXC_DB_PASSWORD }}
                  STRIPE_SECRET_KEY: ${{ secrets.SSXC_STRIPE_SECRET_KEY }}
                  STRIPE_WEBHOOK_SECRET: ${{ secrets.SSXC_STRIPE_WEBHOOK_SECRET }}
                  PRINTFUL_API_KEY: ${{ secrets.SSXC_PRINTFUL_API_KEY }}
                  PRINTFUL_WEBHOOK_SECRET: ${{ secrets.SSXC_PRINTFUL_WEBHOOK_SECRET }}
                  BREVO_API_KEY: ${{ secrets.SSXC_BREVO_API_KEY }}
                  TANSTACK_BASE_URL: ${{ vars.SSXC_TANSTACK_BASE_URL || 'https://seventysixcommerce-react.seventysixsandbox.com' }}
                  SVELTEKIT_BASE_URL: ${{ vars.SSXC_SVELTEKIT_BASE_URL || 'https://seventysixcommerce-svelte.seventysixsandbox.com' }}
                  MOCK_SERVICES: ${{ vars.SSXC_MOCK_SERVICES || 'false' }}
              with:
                  host: ${{ secrets.PROD_HOST }}
                  username: ${{ secrets.PROD_USER }}
                  key: ${{ secrets.PROD_SSH_KEY }}
                  envs: GITHUB_OWNER,SSXC_DB_USER,SSXC_DB_PASSWORD,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,PRINTFUL_API_KEY,PRINTFUL_WEBHOOK_SECRET,BREVO_API_KEY,TANSTACK_BASE_URL,SVELTEKIT_BASE_URL,MOCK_SERVICES
                  script: |
                      set -euo pipefail

                      APP_DIR="/srv/seventysix"
                      cd "$APP_DIR"

                      echo "=== Syncing repo ==="
                      git fetch origin master
                      git reset --hard origin/master
                      git clean -fd -e postgres-ssl/ -e logs/ -e docker/certs/

                      echo "=== Syncing SeventySixCommerce Caddy config ==="
                      sudo cp "$APP_DIR/Caddyfile.seventysixcommerce" /etc/caddy/Caddyfile.seventysixcommerce
                      sudo caddy fmt --overwrite /etc/caddy/Caddyfile.seventysixcommerce
                      sudo caddy validate --config /etc/caddy/Caddyfile
                      sudo systemctl reload caddy

                      echo "=== Saving pre-deploy image digests for rollback ==="
                      TANSTACK_DEFAULT_IMAGE="ghcr.io/${GITHUB_OWNER}/SeventySixCommerce-tanstack:latest"
                      SVELTEKIT_DEFAULT_IMAGE="ghcr.io/${GITHUB_OWNER}/SeventySixCommerce-sveltekit:latest"
                      PREV_TANSTACK=$(docker image inspect --format='{{index .RepoDigests 0}}' "${TANSTACK_DEFAULT_IMAGE}" 2>/dev/null || echo "")
                      PREV_SVELTEKIT=$(docker image inspect --format='{{index .RepoDigests 0}}' "${SVELTEKIT_DEFAULT_IMAGE}" 2>/dev/null || echo "")
                      if [ -n "${PREV_TANSTACK}" ] && [ -n "${PREV_SVELTEKIT}" ]; then
                          printf '{"tanstack":"%s","sveltekit":"%s"}\n' "${PREV_TANSTACK}" "${PREV_SVELTEKIT}" > /tmp/prev-deploy-commerce.json.tmp
                          mv /tmp/prev-deploy-commerce.json.tmp "${APP_DIR}/prev-deploy-commerce.json"
                          echo "Saved rollback target: tanstack=${PREV_TANSTACK} sveltekit=${PREV_SVELTEKIT}"
                      else
                          echo "No existing images found — skipping rollback target save (first deploy or images pruned)"
                          rm -f "${APP_DIR}/prev-deploy-commerce.json"
                      fi

                      echo "=== Pulling SeventySixCommerce images ==="
                      docker compose -f docker-compose.seventysixcommerce.yml pull tanstack sveltekit

                      echo "=== Recording deployed image digests ==="
                      NEW_TANSTACK=$(docker image inspect --format='{{index .RepoDigests 0}}' "${TANSTACK_DEFAULT_IMAGE}" 2>/dev/null || echo "")
                      NEW_SVELTEKIT=$(docker image inspect --format='{{index .RepoDigests 0}}' "${SVELTEKIT_DEFAULT_IMAGE}" 2>/dev/null || echo "")
                      if [ -n "${NEW_TANSTACK}" ] && [ -n "${NEW_SVELTEKIT}" ]; then
                          printf '{"tanstack":"%s","sveltekit":"%s"}\n' "${NEW_TANSTACK}" "${NEW_SVELTEKIT}" > /tmp/last-known-good-commerce.json.tmp
                          mv /tmp/last-known-good-commerce.json.tmp "${APP_DIR}/last-known-good-commerce.json"
                          echo "Recorded deployed digests to last-known-good-commerce.json"
                      fi

                      echo "=== Restarting SeventySixCommerce containers ==="
                      docker compose -f docker-compose.seventysixcommerce.yml up -d --remove-orphans

                      echo "=== Cleaning up old images ==="
                      docker image prune -f

                      echo "=== Waiting for TanStack health (max 60s) ==="
                      for i in $(seq 1 12); do
                          if curl -sf http://localhost:3000/api/healthz > /dev/null 2>&1; then
                              echo "TanStack is healthy (attempt $i/12)"
                              break
                          fi
                          if [ "$i" -eq 12 ]; then
                              echo "ERROR: TanStack health check failed after 12 attempts"
                              docker compose -f docker-compose.seventysixcommerce.yml logs --tail=50 tanstack
                              exit 1
                          fi
                          echo "  Waiting for TanStack... (attempt $i/12)"
                          sleep 5
                      done

                      echo "=== Waiting for SvelteKit health (max 60s) ==="
                      for i in $(seq 1 12); do
                          if curl -sf http://localhost:3001/healthz > /dev/null 2>&1; then
                              echo "SvelteKit is healthy (attempt $i/12)"
                              break
                          fi
                          if [ "$i" -eq 12 ]; then
                              echo "ERROR: SvelteKit health check failed after 12 attempts"
                              docker compose -f docker-compose.seventysixcommerce.yml logs --tail=50 sveltekit
                              exit 1
                          fi
                          echo "  Waiting for SvelteKit... (attempt $i/12)"
                          sleep 5
                      done

                      echo ""
                      echo "=== Final container status ==="
                      docker compose -f docker-compose.seventysixcommerce.yml ps -a

                      echo ""
                      echo "=== SeventySixCommerce deploy complete ==="

    smoke:
        name: Post-Deploy Commerce Smoke Test
        needs: [deploy-production]
        runs-on: ubuntu-latest
        timeout-minutes: 5

        steps:
            - name: Smoke test TanStack health
              run: |
                  echo "=== Smoke testing TanStack health endpoint ==="
                  TANSTACK_URL="${{ vars.SSXC_TANSTACK_BASE_URL || 'https://seventysixcommerce-react.seventysixsandbox.com' }}"
                  if curl -fsSL --retry 5 --retry-delay 10 "${TANSTACK_URL}/api/healthz"; then
                      echo "TanStack health check passed"
                  else
                      echo "::error::TanStack health check failed"
                      exit 1
                  fi

            - name: Smoke test SvelteKit health
              run: |
                  echo "=== Smoke testing SvelteKit health endpoint ==="
                  SVELTEKIT_URL="${{ vars.SSXC_SVELTEKIT_BASE_URL || 'https://seventysixcommerce-svelte.seventysixsandbox.com' }}"
                  if curl -fsSL --retry 5 --retry-delay 10 "${SVELTEKIT_URL}/healthz"; then
                      echo "SvelteKit health check passed"
                  else
                      echo "::error::SvelteKit health check failed"
                      exit 1
                  fi

    rollback:
        name: Rollback Commerce on Smoke Failure
        needs: [smoke]
        if: failure()
        runs-on: ubuntu-latest
        timeout-minutes: 15

        permissions:
            issues: write
            contents: read

        steps:
            - name: Rollback via SSH
              uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
              env:
                  GITHUB_OWNER: ${{ github.repository_owner }}
              with:
                  host: ${{ secrets.PROD_HOST }}
                  username: ${{ secrets.PROD_USER }}
                  key: ${{ secrets.PROD_SSH_KEY }}
                  envs: GITHUB_OWNER
                  script: |
                      set -euo pipefail

                      APP_DIR="/srv/seventysix"
                      cd "$APP_DIR"

                      echo "=== Rolling back to previous deployment ==="
                      git reset --hard HEAD@{1}

                      echo "=== Restoring Caddy configs ==="
                      sudo cp "$APP_DIR/Caddyfile.seventysixcommerce" /etc/caddy/Caddyfile.seventysixcommerce
                      sudo caddy validate --config /etc/caddy/Caddyfile
                      sudo systemctl reload caddy

                      echo "=== Loading pinned rollback image digests ==="
                      if [ ! -f "${APP_DIR}/prev-deploy-commerce.json" ]; then
                          echo "ERROR: No rollback target found — prev-deploy-commerce.json does not exist."
                          echo "This is the first deployment or the file was manually removed."
                          echo "Manual intervention required — use: GITHUB_OWNER=<owner> docker compose -f docker-compose.seventysixcommerce.yml up -d"
                          exit 1
                      fi
                      PREV_TANSTACK=$(python3 -c "import json; d=json.load(open('${APP_DIR}/prev-deploy-commerce.json')); print(d['tanstack'])")
                      PREV_SVELTEKIT=$(python3 -c "import json; d=json.load(open('${APP_DIR}/prev-deploy-commerce.json')); print(d['sveltekit'])")
                      echo "Rolling back to tanstack=${PREV_TANSTACK}"
                      echo "Rolling back to sveltekit=${PREV_SVELTEKIT}"

                      echo "=== Pulling and re-tagging pinned rollback images ==="
                      docker pull "${PREV_TANSTACK}"
                      TANSTACK_BASE="${PREV_TANSTACK%@*}"
                      docker tag "${PREV_TANSTACK}" "${TANSTACK_BASE}:latest"
                      docker pull "${PREV_SVELTEKIT}"
                      SVELTEKIT_BASE="${PREV_SVELTEKIT%@*}"
                      docker tag "${PREV_SVELTEKIT}" "${SVELTEKIT_BASE}:latest"

                      echo "=== Restarting with pinned previous version ==="
                      docker compose -f docker-compose.seventysixcommerce.yml up -d --remove-orphans

                      echo "=== Waiting for TanStack health (max 60s) ==="
                      for i in $(seq 1 12); do
                          if curl -sf http://localhost:3000/api/healthz > /dev/null 2>&1; then
                              echo "TanStack restored (attempt $i/12)"
                              break
                          fi
                          if [ "$i" -eq 12 ]; then
                              echo "ERROR: TanStack still unhealthy after rollback"
                              exit 1
                          fi
                          sleep 5
                      done

                      echo "=== Waiting for SvelteKit health (max 60s) ==="
                      for i in $(seq 1 12); do
                          if curl -sf http://localhost:3001/healthz > /dev/null 2>&1; then
                              echo "SvelteKit restored (attempt $i/12)"
                              break
                          fi
                          if [ "$i" -eq 12 ]; then
                              echo "ERROR: SvelteKit still unhealthy after rollback"
                              exit 1
                          fi
                          sleep 5
                      done

                      echo "=== Commerce rollback complete ==="

            - name: Create incident issue on failed rollback
              if: failure()
              uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
              with:
                  script: |
                      await github.rest.issues.create({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        title: `[INCIDENT] Commerce deploy rollback failed — ${new Date().toISOString()}`,
                        body: `## Commerce Deploy Rollback Failed\n\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n**Ref:** ${context.ref}\n**SHA:** ${context.sha}\n\nSmoke tests failed after commerce deploy and the automated rollback also failed. Manual intervention required.`,
                        labels: ['incident', 'deploy']
                      });


