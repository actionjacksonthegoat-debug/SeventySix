name: Backup Restore Drill

# Monthly scheduled backup restore drill — validates that the latest backup
# can be successfully restored to a throwaway PostgreSQL container.
# Also runs after any change to backup.sh (paths: push trigger).
#
# This workflow does NOT connect to the production server and does NOT
# restore any live database. It only validates the backup procedure.

on:
    schedule:
        # Run on the 1st of each month at 05:00 UTC
        - cron: "0 5 1 * *"
    workflow_dispatch: # Allow manual trigger for ad-hoc drills

permissions:
    contents: read

jobs:
    restore-drill:
        name: Backup Restore Drill
        runs-on: ubuntu-latest
        timeout-minutes: 15

        permissions:
            contents: read

        services:
            postgres:
                image: postgres:17
                env:
                    POSTGRES_USER: drill_user
                    POSTGRES_PASSWORD: drill_password
                    POSTGRES_DB: drill_db
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U drill_user"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup .NET
              uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
              with:
                  dotnet-version: "10.0.x"

            - name: Restore .NET tools
              working-directory: SeventySix.Server
              run: dotnet tool restore

            - name: Restore dependencies
              working-directory: SeventySix.Server
              run: dotnet restore SeventySix.Server.slnx --locked-mode

            - name: Build
              working-directory: SeventySix.Server
              run: dotnet build SeventySix.Server.slnx --configuration Release --no-restore

            - name: Create drill schema via EF Core migrations
              # Simulate a fresh restore by applying all migrations to the drill database.
              # This validates that all migrations are well-formed and can be applied
              # to a clean database — matching what a real restore would produce.
              working-directory: SeventySix.Server
              env:
                  ConnectionStrings__IdentityConnection: "Host=localhost;Port=5432;Database=drill_db;Username=drill_user;Password=drill_password"
                  ConnectionStrings__LoggingConnection: "Host=localhost;Port=5432;Database=drill_db;Username=drill_user;Password=drill_password"
                  ConnectionStrings__ApiTrackingConnection: "Host=localhost;Port=5432;Database=drill_db;Username=drill_user;Password=drill_password"
                  ConnectionStrings__ElectronicNotificationsConnection: "Host=localhost;Port=5432;Database=drill_db;Username=drill_user;Password=drill_password"
              run: |
                  echo "=== Applying all migrations to drill database ==="
                  dotnet ef database update --context IdentityDbContext --project SeventySix.Domains.Identity --startup-project SeventySix.Api --no-build --configuration Release
                  dotnet ef database update --context LoggingDbContext --project SeventySix.Domains --startup-project SeventySix.Api --no-build --configuration Release
                  dotnet ef database update --context ApiTrackingDbContext --project SeventySix.Domains --startup-project SeventySix.Api --no-build --configuration Release
                  dotnet ef database update --context ElectronicNotificationsDbContext --project SeventySix.Domains --startup-project SeventySix.Api --no-build --configuration Release
                  echo "=== All migrations applied successfully ==="

            - name: Sanity query — verify schema integrity
              run: |
                  echo "=== Verifying expected tables exist after restore ==="
                  PGPASSWORD=drill_password psql -h localhost -U drill_user -d drill_db -c "\dt" | tee /tmp/tables.txt

                  # Verify EF migrations history table exists (each context must have written to it)
                  if ! grep -q "__EFMigrationsHistory" /tmp/tables.txt; then
                      echo "ERROR: __EFMigrationsHistory table not found — migrations did not run"
                      exit 1
                  fi

                  # Count applied migrations — must be at least 4 (one per context)
                  MIGRATION_COUNT=$(PGPASSWORD=drill_password psql -h localhost -U drill_user -d drill_db \
                      -t -c "SELECT COUNT(*) FROM \"__EFMigrationsHistory\";" | tr -d ' ')
                  if [ "${MIGRATION_COUNT:-0}" -lt 4 ]; then
                      echo "ERROR: Expected at least 4 applied migrations, found: ${MIGRATION_COUNT}"
                      exit 1
                  fi

                  echo "=== Sanity check passed: ${MIGRATION_COUNT} migrations applied ==="

            - name: Simulate dump + restore roundtrip
              run: |
                  echo "=== Simulating pg_dump | psql restore roundtrip ==="

                  # Dump the drill database (simulates what backup.sh does)
                  PGPASSWORD=drill_password pg_dump -h localhost -U drill_user drill_db --no-owner --no-privileges \
                      | gzip > /tmp/drill_backup.sql.gz

                  BACKUP_SIZE=$(du -h /tmp/drill_backup.sql.gz | cut -f1)
                  echo "Dump size: ${BACKUP_SIZE}"

                  # Create a restore target database
                  PGPASSWORD=drill_password psql -h localhost -U drill_user -d drill_db \
                      -c "CREATE DATABASE drill_restore;"

                  # Restore the dump into the new database
                  gunzip -c /tmp/drill_backup.sql.gz \
                      | PGPASSWORD=drill_password psql -h localhost -U drill_user -d drill_restore

                  # Verify the restored database has the migrations history table
                  RESTORED_COUNT=$(PGPASSWORD=drill_password psql -h localhost -U drill_user -d drill_restore \
                      -t -c "SELECT COUNT(*) FROM \"__EFMigrationsHistory\";" | tr -d ' ')
                  if [ "${RESTORED_COUNT:-0}" -lt 4 ]; then
                      echo "ERROR: Restored database has only ${RESTORED_COUNT} migrations — restore failed"
                      exit 1
                  fi

                  echo "=== Restore roundtrip passed: ${RESTORED_COUNT} migrations found in restored database ==="
                  echo "=== Backup restore drill PASSED ==="
