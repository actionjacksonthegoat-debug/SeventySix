name: Deploy to Production

on:
    workflow_dispatch: # Allow manual trigger for retries/rollbacks
    workflow_run:
        workflows: [CI]
        types: [completed]
        branches: [master]

permissions: {} # This workflow only uses SSH — no GITHUB_TOKEN needed

concurrency:
    group: deploy-production
    cancel-in-progress: false  # Never cancel an in-progress deploy

jobs:
    deploy-staging:
        name: Deploy to Staging
        runs-on: ubuntu-latest
        timeout-minutes: 30
        environment: staging
        if: >-
            github.event_name == 'workflow_dispatch' ||
            github.event.workflow_run.conclusion == 'success'

        steps:
            - name: Validate required secrets
              run: |
                  MISSING=""
                  for var in JWT_SECRET_KEY DB_PASSWORD VALKEY_PASSWORD ADMIN_EMAIL ADMIN_PASSWORD DATA_PROTECTION_CERTIFICATE_PASSWORD; do
                      if [ -z "${!var}" ]; then
                          MISSING="$MISSING $var"
                      fi
                  done
                  if [ -n "$MISSING" ]; then
                      echo "::error::Missing required secrets:$MISSING"
                      exit 1
                  fi
                  echo "All required secrets are configured"
              env:
                  JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
                  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
                  VALKEY_PASSWORD: ${{ secrets.VALKEY_PASSWORD }}
                  ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
                  ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
                  DATA_PROTECTION_CERTIFICATE_PASSWORD: ${{ secrets.DATA_PROTECTION_CERTIFICATE_PASSWORD }}

            - name: Deploy via SSH
              # Risk acceptance: appleboy/ssh-action is single-maintainer.
              # Mitigated by SHA-pinning (not tag-based). The action only executes
              # explicit SSH commands defined in this workflow. Widely adopted (10K+ stars).
              uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
              # All production secrets are injected from GitHub Secrets/Variables.
              # No .env file is used on the server — docker compose reads from the shell environment
              # which appleboy/ssh-action populates via the envs: parameter below.
              env:
                  DB_NAME: ${{ vars.DB_NAME || 'seventysix' }}
                  DB_USER: ${{ vars.DB_USER || 'postgres' }}
                  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
                  JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
                  GITHUB_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
                  GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
                  EMAIL_API_KEY: ${{ secrets.EMAIL_API_KEY }}
                  EMAIL_FROM_ADDRESS: ${{ secrets.EMAIL_FROM_ADDRESS }}
                  SITE_EMAIL: ${{ secrets.SITE_EMAIL }}
                  ALTCHA_HMAC_KEY: ${{ secrets.ALTCHA_HMAC_KEY }}
                  ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
                  ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
                  ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
                  ADMIN_FULLNAME: ${{ vars.ADMIN_FULLNAME || 'System Administrator' }}
                  ADMIN_SEEDER_ENABLED: ${{ vars.ADMIN_SEEDER_ENABLED || 'true' }}
                  DATA_PROTECTION_CERTIFICATE_PASSWORD: ${{ secrets.DATA_PROTECTION_CERTIFICATE_PASSWORD }}
                  CORS_ORIGIN_0: ${{ secrets.CORS_ORIGIN_0 }}
                  CORS_ORIGIN_1: ${{ vars.CORS_ORIGIN_1 || '' }}
                  VALKEY_PASSWORD: ${{ secrets.VALKEY_PASSWORD }}
                  GRAFANA_ADMIN_USER: ${{ vars.GRAFANA_ADMIN_USER || 'admin' }}
                  GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
                  ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
                  CLIENT_BASE_URL: ${{ secrets.CLIENT_BASE_URL }}
                  OAUTH_CALLBACK_URL: ${{ secrets.OAUTH_CALLBACK_URL }}
                  OAUTH_REDIRECT_URI: ${{ secrets.OAUTH_REDIRECT_URI }}
              with:
                  host: ${{ secrets.PROD_HOST }}
                  username: ${{ secrets.PROD_USER }}
                  key: ${{ secrets.PROD_SSH_KEY }}
                  # Forward all env vars above into the remote shell session
                  envs: DB_NAME,DB_USER,DB_PASSWORD,JWT_SECRET_KEY,GITHUB_CLIENT_ID,GITHUB_CLIENT_SECRET,EMAIL_API_KEY,EMAIL_FROM_ADDRESS,SITE_EMAIL,ALTCHA_HMAC_KEY,ADMIN_EMAIL,ADMIN_PASSWORD,ADMIN_USERNAME,ADMIN_FULLNAME,ADMIN_SEEDER_ENABLED,DATA_PROTECTION_CERTIFICATE_PASSWORD,CORS_ORIGIN_0,CORS_ORIGIN_1,VALKEY_PASSWORD,GRAFANA_ADMIN_USER,GRAFANA_ADMIN_PASSWORD,ALLOWED_HOSTS,CLIENT_BASE_URL,OAUTH_CALLBACK_URL,OAUTH_REDIRECT_URI
                  script: |
                      set -euo pipefail

                      APP_DIR="/srv/seventysix"
                      cd "$APP_DIR"

                      echo "=== Ensuring log directory exists ==="
                      mkdir -p "$APP_DIR/logs"
                      touch "$APP_DIR/logs/api.log"

                      echo "=== Syncing repo to origin/master (overwrite local drift) ==="
                      git fetch origin master
                      git reset --hard origin/master
                      git clean -fd -e postgres-ssl/ -e logs/ -e docker/certs/

                      echo "=== Syncing Caddy from checked-in source-of-truth ==="
                      sudo cp "$APP_DIR/Caddyfile.production" /etc/caddy/Caddyfile
                      sudo caddy fmt --overwrite /etc/caddy/Caddyfile

                      echo "=== Syncing SeventySixCommerce Caddy config ==="
                      sudo cp "$APP_DIR/Caddyfile.seventysixcommerce" /etc/caddy/Caddyfile.seventysixcommerce
                      sudo caddy fmt --overwrite /etc/caddy/Caddyfile.seventysixcommerce

                      sudo caddy validate --config /etc/caddy/Caddyfile
                      # Use restart instead of reload — reload hangs when the running config
                      # differs significantly (e.g. adding a global log block) because
                      # caddy reload waits on the admin API while the process applies the new config.
                      # restart does a clean stop+start which is more reliable for config changes.
                      sudo systemctl restart caddy

                      echo "=== Pulling pre-built images from GHCR ==="
                      docker compose -f docker-compose.production.yml pull api client

                      echo "=== Verifying container UIDs match cert ACLs ==="
                      bash "$APP_DIR/scripts/verify-cert-uids.sh"

                      echo "=== Restarting containers ==="
                      # Don't let compose failure skip diagnostics — capture exit code
                      compose_exit=0
                      docker compose -f docker-compose.production.yml up -d --remove-orphans 2>&1 || compose_exit=$?
                      if [ "$compose_exit" -ne 0 ]; then
                          echo "WARNING: docker compose up exited with code $compose_exit (will diagnose below)"
                      fi

                      echo "=== Cleaning up old images ==="
                      docker image prune -f

                      # --- Helper: dump diagnostics for a failed service ---
                      dump_diagnostics() {
                          local svc="$1"
                          echo ""
                          echo "=========================================="
                          echo "DIAGNOSTICS: $svc"
                          echo "=========================================="
                          echo "--- Container status ---"
                          docker compose -f docker-compose.production.yml ps "$svc" 2>&1 || true
                          echo ""
                          echo "--- Container inspect (State) ---"
                          docker inspect --format '{{json .State}}' "seventysix-${svc}-prod" 2>&1 | python3 -m json.tool 2>/dev/null || true
                          echo ""
                          echo "--- Last 100 lines of logs ---"
                          docker compose -f docker-compose.production.yml logs --tail=100 --no-color "$svc" 2>&1 || true
                          echo ""
                          echo "--- Health check result ---"
                          docker inspect --format '{{json .State.Health}}' "seventysix-${svc}-prod" 2>&1 | python3 -m json.tool 2>/dev/null || true
                          echo "=========================================="
                      }

                      echo "=== Waiting for API health check (max 150s) ==="
                      for i in $(seq 1 30); do
                          if curl -sf http://localhost:5085/health > /dev/null 2>&1; then
                              echo "API is healthy (attempt $i/30)"
                              break
                          fi
                          if [ "$i" -eq 30 ]; then
                              echo "ERROR: API health check failed after 30 attempts (150s)"
                              echo "--- HTTP response from health endpoint ---"
                              curl -sv http://localhost:5085/health 2>&1 || true
                              dump_diagnostics "api"
                              echo "--- All container statuses ---"
                              docker compose -f docker-compose.production.yml ps -a 2>&1 || true
                              exit 1
                          fi
                          echo "  Waiting for API... (attempt $i/30)"
                          sleep 5
                      done

                      echo "=== Waiting for Client health check (max 30s) ==="
                      for i in $(seq 1 10); do
                          if curl -sf http://localhost:8080 > /dev/null 2>&1; then
                              echo "Client is healthy (attempt $i/10)"
                              break
                          fi
                          if [ "$i" -eq 10 ]; then
                              echo "ERROR: Client health check failed after 10 attempts (30s)"
                              echo "--- HTTP response from client ---"
                              curl -sv http://localhost:8080 2>&1 || true
                              dump_diagnostics "client"
                              exit 1
                          fi
                          echo "  Waiting for Client... (attempt $i/10)"
                          sleep 3
                      done

                      echo "=== Checking observability stack (non-blocking) ==="
                      for svc in "Grafana:3000/api/health" "Prometheus:9090/-/healthy" "Jaeger:16686"; do
                          name="${svc%%:*}"
                          path="${svc#*:}"
                          if curl -sf "http://localhost:${path}" > /dev/null 2>&1; then
                              echo "${name} is healthy"
                          else
                              echo "WARNING: ${name} health check failed (non-blocking — deploy continues)"
                          fi
                      done

                      echo ""
                      echo "=== Final container status ==="
                      docker compose -f docker-compose.production.yml ps -a

                      echo ""
                      echo "=== Deploy complete ==="

    smoke-staging:
        name: Post-Deploy Smoke Test
        needs: [deploy-staging]
        runs-on: ubuntu-latest
        timeout-minutes: 5

        steps:
            - name: Smoke test API health
              run: |
                  echo "=== Smoke testing API health endpoint ==="
                  if curl -fsSL --retry 5 --retry-delay 10 "${{ secrets.CLIENT_BASE_URL }}/api/health"; then
                      echo "API health check passed"
                  else
                      echo "::error::API health check failed"
                      exit 1
                  fi

            - name: Smoke test API readiness
              run: |
                  echo "=== Smoke testing API readiness endpoint ==="
                  if curl -fsSL --retry 5 --retry-delay 10 "${{ secrets.CLIENT_BASE_URL }}/api/health/ready"; then
                      echo "API readiness check passed"
                  else
                      echo "::error::API readiness check failed"
                      exit 1
                  fi

            - name: Smoke test client page load
              run: |
                  echo "=== Smoke testing client page load ==="
                  STATUS=$(curl -o /dev/null -s -w "%{http_code}" --retry 5 --retry-delay 10 "${{ secrets.CLIENT_BASE_URL }}")
                  if [ "$STATUS" -eq 200 ]; then
                      echo "Client page load returned HTTP $STATUS"
                  else
                      echo "::error::Client page load returned HTTP $STATUS (expected 200)"
                      exit 1
                  fi

    rollback-staging:
        name: Rollback Staging (on smoke failure)
        needs: [smoke-staging]
        if: failure()
        runs-on: ubuntu-latest
        timeout-minutes: 15

        permissions:
            issues: write
            contents: read

        steps:
            - name: Rollback via SSH
              uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
              with:
                  host: ${{ secrets.PROD_HOST }}
                  username: ${{ secrets.PROD_USER }}
                  key: ${{ secrets.PROD_SSH_KEY }}
                  script: |
                      set -euo pipefail

                      APP_DIR="/srv/seventysix"
                      cd "$APP_DIR"

                      echo "=== Rolling back to previous deployment ==="
                      git reset --hard HEAD@{1}

                      echo "=== Restoring Caddy configs ==="
                      sudo cp "$APP_DIR/Caddyfile.production" /etc/caddy/Caddyfile
                      sudo cp "$APP_DIR/Caddyfile.seventysixcommerce" /etc/caddy/Caddyfile.seventysixcommerce
                      sudo caddy validate --config /etc/caddy/Caddyfile
                      sudo systemctl restart caddy

                      echo "=== Pulling previous images ==="
                      docker compose -f docker-compose.production.yml pull api client

                      echo "=== Restarting with previous version ==="
                      docker compose -f docker-compose.production.yml up -d --remove-orphans

                      echo "=== Waiting for API health (max 150s) ==="
                      for i in $(seq 1 30); do
                          if curl -sf http://localhost:5085/health > /dev/null 2>&1; then
                              echo "API restored (attempt $i/30)"
                              break
                          fi
                          if [ "$i" -eq 30 ]; then
                              echo "ERROR: API still unhealthy after rollback"
                              exit 1
                          fi
                          sleep 5
                      done

                      echo "=== Rollback complete ==="

            - name: Create incident issue on failed rollback
              if: failure()
              uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
              with:
                  script: |
                      await github.rest.issues.create({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        title: `[INCIDENT] Deploy rollback failed — ${new Date().toISOString()}`,
                        body: `## Deploy Rollback Failed\n\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n**Ref:** ${context.ref}\n**SHA:** ${context.sha}\n\nSmoke tests failed after deploy and the automated rollback also failed. Manual intervention required.`,
                        labels: ['incident', 'deploy']
                      });

    deploy-production:
        name: Promote to Production
        needs: [smoke-staging]
        runs-on: ubuntu-latest
        timeout-minutes: 5
        # Production environment requires manual approval via GitHub Environment protection rules.
        # NOTE: You must create a "production" environment in GitHub repo settings with required reviewers.
        environment: production

        steps:
            - name: Confirm production promotion
              run: |
                  echo "============================================"
                  echo "  Production Promotion Approved"
                  echo "============================================"
                  echo ""
                  echo "  Staging deploy and smoke tests passed."
                  echo "  Manual approval received via GitHub Environment protection."
                  echo "  Production is now serving the deployed version."
                  echo ""
                  echo "============================================"
