name: DAST Security Scan

on:
    push:
        branches: [master]
    schedule:
        # Run weekly on Monday at 8:00 UTC (after CodeQL at 6:00 UTC)
        - cron: "0 8 * * 1"
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: dast-${{ github.ref }}
    cancel-in-progress: true

jobs:
    dast-scan:
        name: Main App DAST
        uses: ./.github/workflows/reusable-dast-scan.yml
        with:
            target-url: "https://localhost:4301"
            compose-file: "docker-compose.dast.yml"
            app-name: "main"
            ready-endpoint: "https://localhost:7274/health"
            service-name: "api-dast"
            needs-ssl: true
            needs-auth: true
            auth-endpoint: "https://localhost:7274/api/v1/auth/login"
            use-insecure-curl: true
            extra-zap-options: "--hook .zap/auth-hook.py"
            client-ready-endpoint: "https://localhost:4301/"
        permissions:
            security-events: write
            contents: read
            actions: read

    dast-scan-commerce-sveltekit:
        name: Commerce SvelteKit DAST
        uses: ./.github/workflows/reusable-dast-scan.yml
        with:
            target-url: "http://localhost:3031"
            compose-file: "ECommerce/seventysixcommerce-sveltekit/docker-compose.dast.yml"
            app-name: "commerce-sveltekit"
            ready-endpoint: "http://localhost:3031/healthz"
            service-name: "sveltekit-dast"
        permissions:
            security-events: write
            contents: read
            actions: read

    dast-scan-commerce-tanstack:
        name: Commerce TanStack DAST
        uses: ./.github/workflows/reusable-dast-scan.yml
        with:
            target-url: "http://localhost:3032"
            compose-file: "ECommerce/seventysixcommerce-tanstack/docker-compose.dast.yml"
            app-name: "commerce-tanstack"
            ready-endpoint: "http://localhost:3032/api/healthz"
            service-name: "tanstack-dast"
        permissions:
            security-events: write
            contents: read
            actions: read
