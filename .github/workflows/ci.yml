name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]
    workflow_dispatch:

permissions:
    contents: read

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # ──────────────────────────────────────────────────────────
    # Stage 0: Security scans (parallel, non-blocking for PRs on transient issues)
    # ──────────────────────────────────────────────────────────
    security-scan:
        name: Security Scan (npm audit + dotnet vulnerable + gitleaks)
        runs-on: ubuntu-latest
        timeout-minutes: 15

        permissions:
            contents: read
            security-events: write

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version: "24.x"

            - name: Setup .NET
              uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
              with:
                  dotnet-version: "10.0.x"

            - name: npm audit (root)
              run: npm audit --audit-level=high --omit=dev

            - name: npm audit (Angular client)
              working-directory: SeventySix.Client
              run: |
                  npm ci --ignore-scripts
                  npm audit --audit-level=high --omit=dev

            - name: npm audit (SvelteKit commerce)
              working-directory: ECommerce/seventysixcommerce-sveltekit
              run: |
                  npm ci --ignore-scripts
                  npm audit --audit-level=high --omit=dev

            - name: npm audit (TanStack commerce)
              working-directory: ECommerce/seventysixcommerce-tanstack
              run: |
                  npm ci --ignore-scripts
                  npm audit --audit-level=high --omit=dev

            - name: dotnet list package --vulnerable (server)
              working-directory: SeventySix.Server
              run: |
                  dotnet restore SeventySix.Server.slnx --locked-mode
                  dotnet list SeventySix.Server.slnx package --vulnerable --include-transitive

            - name: Gitleaks secret scan
              uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITLEAKS_CONFIG: .github/gitleaks.toml

            - name: Audit workflow security policy
              run: node scripts/audit-workflows.mjs

    # ──────────────────────────────────────────────────────────
    # Stage 1: Lint + Build + Unit tests (parallel)
    # ──────────────────────────────────────────────────────────
    client-build:
        name: Client Build & Test
        runs-on: ubuntu-latest
        timeout-minutes: 30

        permissions:
            contents: read

        defaults:
            run:
                working-directory: SeventySix.Client

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version: "24.x"

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Build
              run: npm run build

            - name: Test with coverage
              run: npm run test:coverage

            - name: Upload client coverage to Codecov
              uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
              continue-on-error: true  # justification: Codecov is a transient external service; upload failures must not block CI
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: coverage/lcov.info
                  flags: client
                  name: client-coverage
                  fail_ci_if_error: true
                  skip_validation: true  # ubuntu-latest runners don't pre-install Codecov's GPG key; SHA-pinned action provides supply-chain integrity

            - name: Upload client artifact
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
              with:
                  name: client-dist
                  path: SeventySix.Client/dist
                  retention-days: 7

    server-build:
        name: Server Build & Test
        runs-on: ubuntu-latest
        timeout-minutes: 30
        # NOTE: Server tests use Testcontainers (requires Docker).
        # ubuntu-latest includes Docker by default.

        permissions:
            contents: read
            checks: write
            pull-requests: write

        defaults:
            run:
                working-directory: SeventySix.Server

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup .NET
              uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
              with:
                  dotnet-version: "10.0.x"

            - name: Restore dependencies
              run: dotnet restore SeventySix.Server.slnx --locked-mode

            - name: Build
              run: dotnet build SeventySix.Server.slnx --configuration Release --no-restore /p:TreatWarningsAsErrors=true

            - name: Test with coverage
              run: >
                  dotnet test SeventySix.Server.slnx
                  --configuration Release
                  --no-build
                  --verbosity normal
                  --collect:"XPlat Code Coverage"
                  --settings ./coverlet.runsettings
                  --results-directory ./TestResults
                  --logger "trx"

            - name: Publish server test results
              uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2
              if: always()
              with:
                  files: SeventySix.Server/TestResults/**/*.trx

            - name: Upload server coverage to Codecov
              uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
              continue-on-error: true  # justification: Codecov is a transient external service; upload failures must not block CI
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: SeventySix.Server/TestResults/**/coverage.cobertura.xml
                  flags: server
                  name: server-coverage
                  fail_ci_if_error: true
                  skip_validation: true  # ubuntu-latest runners don't pre-install Codecov's GPG key; SHA-pinned action provides supply-chain integrity

            - name: Upload coverage artifact
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
              with:
                  name: server-coverage
                  path: SeventySix.Server/TestResults/**/coverage.cobertura.xml
                  retention-days: 7

    # ──────────────────────────────────────────────────────────
    # Stage 2: Migration roundtrip (parallel with Stage 3)
    # ──────────────────────────────────────────────────────────
    migration-roundtrip:
        name: Migration Roundtrip
        needs: [server-build]
        runs-on: ubuntu-latest
        timeout-minutes: 15

        permissions:
            contents: read

        services:
            postgres:
                image: postgres:17
                env:
                    POSTGRES_USER: migration_test
                    POSTGRES_PASSWORD: migration_test
                    POSTGRES_DB: migration_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U migration_test"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        defaults:
            run:
                working-directory: SeventySix.Server

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup .NET
              uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
              with:
                  dotnet-version: "10.0.x"

            - name: Restore tools
              run: dotnet tool restore

            - name: Restore dependencies
              run: dotnet restore SeventySix.Server.slnx --locked-mode

            - name: Build
              run: dotnet build SeventySix.Server.slnx --configuration Release --no-restore

            - name: Create per-context test databases
              run: |
                  # The service container creates 'migration_test' as the default DB.
                  # Create isolated databases for each context to catch schema/name collisions.
                  for DB in identity_migration_test logging_migration_test apitracking_migration_test notifications_migration_test combined_migration_test; do
                      PGPASSWORD=migration_test psql -h localhost -U migration_test -d migration_test -c "CREATE DATABASE ${DB};"
                  done

            - name: Migration roundtrip — IdentityDbContext
              env:
                  ConnectionStrings__IdentityConnection: "Host=localhost;Port=5432;Database=identity_migration_test;Username=migration_test;Password=migration_test"
              run: |
                  echo "=== Apply all migrations ==="
                  dotnet ef database update --context IdentityDbContext --project SeventySix.Domains.Identity --startup-project SeventySix.Api --no-build --configuration Release

                  echo "=== Roll back to InitialCreate ==="
                  dotnet ef database update InitialCreate --context IdentityDbContext --project SeventySix.Domains.Identity --startup-project SeventySix.Api --no-build --configuration Release

                  echo "=== Re-apply all migrations ==="
                  dotnet ef database update --context IdentityDbContext --project SeventySix.Domains.Identity --startup-project SeventySix.Api --no-build --configuration Release

                  echo "=== Roll back to empty ==="
                  dotnet ef database update 0 --context IdentityDbContext --project SeventySix.Domains.Identity --startup-project SeventySix.Api --no-build --configuration Release

            - name: Migration roundtrip — LoggingDbContext
              env:
                  ConnectionStrings__LoggingConnection: "Host=localhost;Port=5432;Database=logging_migration_test;Username=migration_test;Password=migration_test"
              run: |
                  dotnet ef database update --context LoggingDbContext --project SeventySix.Domains --startup-project SeventySix.Api --no-build --configuration Release
                  dotnet ef database update 0 --context LoggingDbContext --project SeventySix.Domains --startup-project SeventySix.Api --no-build --configuration Release
                  dotnet ef database update --context LoggingDbContext --project SeventySix.Domains --startup-project SeventySix.Api --no-build --configuration Release

            - name: Migration roundtrip — ApiTrackingDbContext
              env:
                  ConnectionStrings__ApiTrackingConnection: "Host=localhost;Port=5432;Database=apitracking_migration_test;Username=migration_test;Password=migration_test"
              run: |
                  dotnet ef database update --context ApiTrackingDbContext --project SeventySix.Domains --startup-project SeventySix.Api --no-build --configuration Release
                  dotnet ef database update 0 --context ApiTrackingDbContext --project SeventySix.Domains --startup-project SeventySix.Api --no-build --configuration Release
                  dotnet ef database update --context ApiTrackingDbContext --project SeventySix.Domains --startup-project SeventySix.Api --no-build --configuration Release

            - name: Migration roundtrip — ElectronicNotificationsDbContext
              env:
                  ConnectionStrings__ElectronicNotificationsConnection: "Host=localhost;Port=5432;Database=notifications_migration_test;Username=migration_test;Password=migration_test"
              run: |
                  dotnet ef database update --context ElectronicNotificationsDbContext --project SeventySix.Domains --startup-project SeventySix.Api --no-build --configuration Release
                  dotnet ef database update 0 --context ElectronicNotificationsDbContext --project SeventySix.Domains --startup-project SeventySix.Api --no-build --configuration Release
                  dotnet ef database update --context ElectronicNotificationsDbContext --project SeventySix.Domains --startup-project SeventySix.Api --no-build --configuration Release

            - name: Schema collision check — all contexts on combined DB
              env:
                  ConnectionStrings__IdentityConnection: "Host=localhost;Port=5432;Database=combined_migration_test;Username=migration_test;Password=migration_test"
                  ConnectionStrings__LoggingConnection: "Host=localhost;Port=5432;Database=combined_migration_test;Username=migration_test;Password=migration_test"
                  ConnectionStrings__ApiTrackingConnection: "Host=localhost;Port=5432;Database=combined_migration_test;Username=migration_test;Password=migration_test"
                  ConnectionStrings__ElectronicNotificationsConnection: "Host=localhost;Port=5432;Database=combined_migration_test;Username=migration_test;Password=migration_test"
              run: |
                  echo "=== Applying all 4 contexts to the same DB (detects schema/table name collisions) ==="
                  dotnet ef database update --context IdentityDbContext --project SeventySix.Domains.Identity --startup-project SeventySix.Api --no-build --configuration Release
                  dotnet ef database update --context LoggingDbContext --project SeventySix.Domains --startup-project SeventySix.Api --no-build --configuration Release
                  dotnet ef database update --context ApiTrackingDbContext --project SeventySix.Domains --startup-project SeventySix.Api --no-build --configuration Release
                  dotnet ef database update --context ElectronicNotificationsDbContext --project SeventySix.Domains --startup-project SeventySix.Api --no-build --configuration Release
                  echo "=== No schema collisions detected ==="

    # ──────────────────────────────────────────────────────────
    # Stage 3: Integration tests (parallel — E2E + Load)
    # ──────────────────────────────────────────────────────────
    e2e:
        name: E2E Tests
        needs: [client-build, server-build]
        runs-on: ubuntu-latest
        timeout-minutes: 45
        # NOTE: E2E tests use Docker Compose for infrastructure (database, cache, API, client).
        # ubuntu-latest includes Docker and Docker Compose by default.
        # Playwright runs on the host against Dockerized services.

        permissions:
            contents: read

        defaults:
            run:
                working-directory: SeventySix.Client

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version: "24.x"

            - name: Install dependencies
              run: npm ci

            - name: Generate SSL certificate
              shell: pwsh
              working-directory: ${{ github.workspace }}
              run: scripts/generate-dev-ssl-cert.ps1 -SkipTrust

            - name: Fix SSL certificate permissions (Linux Docker compatibility)
              run: chmod 644 ssl/dev-certificate.* || true
              working-directory: SeventySix.Client

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium

            - name: Run E2E tests
              run: npm run test:e2e
              env:
                  CI: true
                  NODE_EXTRA_CA_CERTS: ssl/dev-certificate.crt

            - name: Show failed test summary
              if: failure()
              run: |
                  echo "============================================"
                  echo "  Failed E2E Test Summary"
                  echo "============================================"
                  if [ -d "test-results" ]; then
                      echo ""
                      echo "Failed test traces:"
                      find test-results -name "*.zip" -o -name "*.png" -o -name "*.webm" | head -50
                      echo ""
                  fi
                  if [ -f "playwright-report/index.html" ]; then
                      echo "Playwright HTML report available in artifacts."
                  else
                      echo "No Playwright report generated — failure likely occurred during setup."
                  fi
                  echo "============================================"

            - name: Upload Playwright report
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
              if: always()
              with:
                  name: playwright-report
                  path: SeventySix.Client/playwright-report/
                  retention-days: 7

            - name: Upload test results
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
              if: always()
              with:
                  name: e2e-test-results
                  path: SeventySix.Client/test-results/
                  if-no-files-found: ignore
                  retention-days: 7

    load-test:
        name: Load Tests
        needs: [client-build, server-build]
        runs-on: ubuntu-latest
        timeout-minutes: 45
        # NOTE: Load tests use Docker Compose for infrastructure + k6 on the host.
        # ubuntu-latest includes Docker and Docker Compose by default.

        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version: "24.x"

            - name: Install k6
              run: |
                  sudo gpg -k
                  sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
                      --keyserver hkps://keyserver.ubuntu.com --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
                  echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
                      | sudo tee /etc/apt/sources.list.d/k6.list
                  sudo apt-get update
                  sudo apt-get install -y k6
                  k6 version

            - name: Generate SSL certificate
              shell: pwsh
              working-directory: ${{ github.workspace }}
              run: scripts/generate-dev-ssl-cert.ps1 -SkipTrust

            - name: Fix SSL certificate permissions (Linux Docker compatibility)
              run: chmod 644 SeventySix.Client/ssl/dev-certificate.* || true

            - name: Run load tests
              run: node scripts/run-load-tests.mjs --app main --profile quick
              env:
                  NODE_EXTRA_CA_CERTS: SeventySix.Client/ssl/dev-certificate.crt

            - name: Show load test failure details
              if: failure()
              run: |
                  echo "============================================"
                  echo "  Failed Load Test Summary"
                  echo "============================================"
                  if [ -d "SeventySix.Client/load-testing/results" ]; then
                      echo "Result files:"
                      find SeventySix.Client/load-testing/results -type f | head -20
                  fi
                  echo ""
                  echo "Docker container logs:"
                  docker compose -f docker-compose.loadtest.yml logs --tail=50 api-loadtest 2>/dev/null || true
                  echo "============================================"

            - name: Upload load test report
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
              if: always()
              with:
                  name: load-test-report
                  path: |
                      SeventySix.Client/load-testing/reports/
                      SeventySix.Client/load-testing/results/
                  if-no-files-found: ignore
                  retention-days: 7

    # ──────────────────────────────────────────────────────────
    # Stage 4: Quality gate — all checks must pass
    # ──────────────────────────────────────────────────────────
    quality-gate:
        name: Quality Gate
        needs: [client-build, server-build, migration-roundtrip, e2e, load-test]
        runs-on: ubuntu-latest
        timeout-minutes: 15
        if: always()

        permissions:
            contents: read

        steps:
            - name: Evaluate gate results
              run: |
                  echo "============================================"
                  echo "  Quality Gate Results"
                  echo "============================================"
                  echo ""

                  FAILED=0

                  check_job() {
                      local name="$1"
                      local result="$2"
                      if [ "$result" = "success" ]; then
                          printf "  %-30s PASSED\n" "$name"
                      else
                          printf "  %-30s FAILED (%s)\n" "$name" "$result"
                          FAILED=1
                      fi
                  }

                  check_job "Client Build & Test" "${{ needs.client-build.result }}"
                  check_job "Server Build & Test" "${{ needs.server-build.result }}"
                  check_job "Migration Roundtrip" "${{ needs.migration-roundtrip.result }}"
                  check_job "E2E Tests" "${{ needs.e2e.result }}"
                  check_job "Load Tests" "${{ needs.load-test.result }}"

                  echo ""
                  echo "  Checks enforced:"
                  echo "    - ESLint (client lint — zero errors)"
                  echo "    - Angular production build (zero warnings)"
                  echo "    - Vitest (all client tests pass + ≥80% coverage threshold)"
                  echo "    - dotnet build Release (TreatWarningsAsErrors)"
                  echo "    - dotnet test (all server tests pass + ≥80% line coverage via coverlet.runsettings)"
                  echo "    - Migration roundtrip (all EF Core migrations apply and roll back cleanly)"
                  echo "    - Playwright E2E (all tests pass)"
                  echo "    - k6 load tests (all scenarios pass thresholds)"
                  echo "    - Codecov (PR status checks post ≥80% project coverage)"
                  echo ""
                  echo "============================================"

                  if [ "$FAILED" -eq 1 ]; then
                      echo "  Quality Gate: FAILED"
                      echo "============================================"
                      exit 1
                  fi

                  echo "  Quality Gate: PASSED"
                  echo "============================================"

    publish:
        name: Publish Docker Images
        needs: [quality-gate]
        runs-on: ubuntu-latest
        timeout-minutes: 30
        if: github.ref == 'refs/heads/master' && github.event_name == 'push' && needs.quality-gate.result == 'success'

        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

            - name: Log in to GHCR
              uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              run: |
                  echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
                  echo "date=$(date -u +%Y%m%d)" >> $GITHUB_OUTPUT

            - name: Build and push API image
              uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
              with:
                  context: ./SeventySix.Server
                  file: ./SeventySix.Server/Dockerfile.production
                  target: final
                  platforms: linux/amd64
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/seventysix-api:latest
                      ghcr.io/${{ github.repository_owner }}/seventysix-api:${{ github.sha }}
                      ghcr.io/${{ github.repository_owner }}/seventysix-api:${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha_short }}
                  build-args: |
                      DB_DESIGN_HOST=${{ vars.DB_HOST }}
                      DB_DESIGN_PORT=${{ vars.DB_PORT }}
                      DB_DESIGN_NAME=${{ vars.DB_NAME }}
                      DB_DESIGN_USER=${{ vars.DB_USER }}
                      DB_DESIGN_PASSWORD=${{ secrets.DB_PASSWORD }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Generate SBOM for API image
              uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
              with:
                  image: ghcr.io/${{ github.repository_owner }}/seventysix-api:${{ github.sha }}
                  format: spdx-json
                  output-file: sbom-api.spdx.json

            - name: Build and push Client image
              uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
              with:
                  context: ./SeventySix.Client
                  file: ./SeventySix.Client/Dockerfile.production
                  platforms: linux/amd64
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/seventysix-client:latest
                      ghcr.io/${{ github.repository_owner }}/seventysix-client:${{ github.sha }}
                      ghcr.io/${{ github.repository_owner }}/seventysix-client:${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha_short }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Generate SBOM for Client image
              uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
              with:
                  image: ghcr.io/${{ github.repository_owner }}/seventysix-client:${{ github.sha }}
                  format: spdx-json
                  output-file: sbom-client.spdx.json

            - name: Build and push Migrations image
              uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
              with:
                  context: ./SeventySix.Server
                  file: ./SeventySix.Server/Dockerfile.production
                  target: migrations
                  platforms: linux/amd64
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/seventysix-migrations:latest
                      ghcr.io/${{ github.repository_owner }}/seventysix-migrations:${{ github.sha }}
                      ghcr.io/${{ github.repository_owner }}/seventysix-migrations:${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha_short }}
                  build-args: |
                      DB_DESIGN_HOST=${{ vars.DB_HOST }}
                      DB_DESIGN_PORT=${{ vars.DB_PORT }}
                      DB_DESIGN_NAME=${{ vars.DB_NAME }}
                      DB_DESIGN_USER=${{ vars.DB_USER }}
                      DB_DESIGN_PASSWORD=${{ secrets.DB_PASSWORD }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Generate SBOM for Migrations image
              uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
              with:
                  image: ghcr.io/${{ github.repository_owner }}/seventysix-migrations:${{ github.sha }}
                  format: spdx-json
                  output-file: sbom-migrations.spdx.json

            - name: Upload SBOM artifacts
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
              with:
                  name: sbom-reports
                  path: |
                      sbom-api.spdx.json
                      sbom-client.spdx.json
                      sbom-migrations.spdx.json
                  retention-days: 90

    # ──────────────────────────────────────────────────────────
    # Stage 5: Container vulnerability scans (after publish)
    # ──────────────────────────────────────────────────────────
    scan-api-image:
        name: Scan API Image
        needs: [publish]
        if: needs.publish.result == 'success'
        uses: ./.github/workflows/reusable-container-scan.yml
        with:
            image-ref: ghcr.io/${{ github.repository_owner }}/seventysix-api:${{ github.sha }}
            image-name: seventysix-api
        permissions:
            contents: read
            security-events: write

    scan-client-image:
        name: Scan Client Image
        needs: [publish]
        if: needs.publish.result == 'success'
        uses: ./.github/workflows/reusable-container-scan.yml
        with:
            image-ref: ghcr.io/${{ github.repository_owner }}/seventysix-client:${{ github.sha }}
            image-name: seventysix-client
        permissions:
            contents: read
            security-events: write

    scan-migrations-image:
        name: Scan Migrations Image
        needs: [publish]
        if: needs.publish.result == 'success'
        uses: ./.github/workflows/reusable-container-scan.yml
        with:
            image-ref: ghcr.io/${{ github.repository_owner }}/seventysix-migrations:${{ github.sha }}
            image-name: seventysix-migrations
        permissions:
            contents: read
            security-events: write
