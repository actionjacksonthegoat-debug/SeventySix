# Reusable workflow: Trivy container vulnerability scan + SARIF upload.
# Called from ci.yml and seventysixcommerce-ci.yml after images are pushed.
name: Container Vulnerability Scan

on:
    workflow_call:
        inputs:
            image-ref:
                description: "Full image reference including tag (e.g. ghcr.io/owner/app:sha)"
                required: true
                type: string
            image-name:
                description: "Short name for artifact naming (e.g. seventysix-api)"
                required: true
                type: string
            sarif-category:
                description: "Override SARIF category for Code Scanning (default: trivy-{image-name})"
                required: false
                type: string
                default: ""

permissions:
    contents: read

jobs:
    scan:
        name: Trivy Scan — ${{ inputs.image-name }}
        runs-on: ubuntu-latest
        timeout-minutes: 15

        permissions:
            contents: read
            security-events: write

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
              with:
                  image-ref: ${{ inputs.image-ref }}
                  format: "sarif"
                  output: "trivy-${{ inputs.image-name }}.sarif"
                  severity: "CRITICAL,HIGH"
                  exit-code: "0"
                  trivyignores: .trivyignore

            - name: Upload Trivy SARIF to GitHub Security tab
              uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
              with:
                  sarif_file: "trivy-${{ inputs.image-name }}.sarif"
                  category: ${{ inputs.sarif-category != '' && inputs.sarif-category || format('trivy-{0}', inputs.image-name) }}

            - name: Upload Trivy SARIF as artifact
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
              with:
                  name: trivy-scan-${{ inputs.image-name }}
                  path: "trivy-${{ inputs.image-name }}.sarif"
                  retention-days: 30

            - name: Fail on unfixed CRITICAL CVEs
              uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
              with:
                  image-ref: ${{ inputs.image-ref }}
                  format: "table"
                  severity: "CRITICAL"
                  exit-code: "1"
                  ignore-unfixed: true
                  trivyignores: .trivyignore
