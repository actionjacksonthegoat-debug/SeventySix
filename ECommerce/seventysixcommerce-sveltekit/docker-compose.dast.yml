# docker-compose.dast.yml — SeventySixCommerce SvelteKit DAST Environment
# Usage: docker compose -f docker-compose.dast.yml up -d
#
# Key differences from E2E:
# - Rate limiting disabled (ZAP active scanning triggers rate limits)
# - Mock services enabled (ZAP can't interact with real Stripe/payment flows)
#
# Port Allocation (isolated from dev, E2E, LoadTest):
# - PostgreSQL: 5444 (dev: 5439, E2E: 5440, LoadTest: 5442)
# - App: 3031 (dev: 3001, E2E: 3011, LoadTest: 3021)

name: seventysixcommerce-sveltekit-dast

services:
  postgres-dast:
    image: postgres:18-alpine
    container_name: ssxc-svelte-postgres-dast
    ports:
      - "127.0.0.1:5444:5432"
    environment:
      POSTGRES_USER: ssxc_dast
      POSTGRES_PASSWORD: ssxc_dast_password
      POSTGRES_DB: seventysixcommerce_sveltekit_dast
      PGDATA: /var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ssxc_dast -d seventysixcommerce_sveltekit_dast" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ssxc-svelte-dast-network

  db-init:
    build:
      context: ..
      dockerfile: seventysixcommerce-sveltekit/Dockerfile
      target: db-init
    container_name: ssxc-svelte-db-init-dast
    environment:
      DATABASE_URL: postgresql://ssxc_dast:ssxc_dast_password@postgres-dast:5432/seventysixcommerce_sveltekit_dast
    depends_on:
      postgres-dast:
        condition: service_healthy
    networks:
      - ssxc-svelte-dast-network

  sveltekit-dast:
    build:
      context: ..
      dockerfile: seventysixcommerce-sveltekit/Dockerfile
    container_name: ssxc-svelte-app-dast
    ports:
      - "127.0.0.1:3031:3001"
    environment:
      DATABASE_URL: postgresql://ssxc_dast:ssxc_dast_password@postgres-dast:5432/seventysixcommerce_sveltekit_dast
      MOCK_SERVICES: "true"
      RATE_LIMIT_DISABLED: "true"
      NODE_ENV: production
      BASE_URL: http://localhost:3031
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres-dast:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider http://localhost:3001/healthz || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ssxc-svelte-dast-network

networks:
  ssxc-svelte-dast-network:
    driver: bridge
