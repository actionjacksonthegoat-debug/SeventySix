services:
  db:
    image: postgres:18-alpine
    container_name: ssxc-sveltekit-dev-db
    restart: unless-stopped
    ports:
      - "5439:5432"
    environment:
      POSTGRES_DB: seventysixcommerce_sveltekit_dev
      POSTGRES_USER: ssxc_dev
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_only}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - ssxc-sveltekit-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ssxc_dev -d seventysixcommerce_sveltekit_dev" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

volumes:
  ssxc-sveltekit-dev-data:
