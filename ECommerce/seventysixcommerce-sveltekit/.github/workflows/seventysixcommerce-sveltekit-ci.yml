name: SeventySixCommerce SvelteKit CI
on:
  pull_request:
    branches: [master]
    paths: ['ECommerce/seventysixcommerce-sveltekit/**']
  push:
    branches: [master]
    paths: ['ECommerce/seventysixcommerce-sveltekit/**']

defaults:
  run:
    working-directory: ECommerce/seventysixcommerce-sveltekit

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: seventysixcommerce_sveltekit_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U test_user"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ECommerce/seventysixcommerce-sveltekit/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Link shared module resolution to app dependencies
        run: node ../../scripts/link-commerce-shared-node-modules.mjs --app sveltekit
      - name: Svelte Check
        run: npm run check
      - name: Test with coverage
        run: npx vitest run --coverage
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/seventysixcommerce_sveltekit_test
