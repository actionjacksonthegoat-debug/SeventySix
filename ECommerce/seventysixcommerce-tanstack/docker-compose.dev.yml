services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: seventysixcommerce
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seventysixcommerce_dev}
      POSTGRES_DB: seventysixcommerce
      PGDATA: /var/lib/postgresql/data
    ports:
      - '5438:5432'
    volumes:
      - ssxc_tanstack_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U seventysixcommerce']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

volumes:
  ssxc_tanstack_pgdata:
