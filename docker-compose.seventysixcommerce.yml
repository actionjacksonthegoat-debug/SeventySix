# Docker Compose for SeventySixCommerce Production Deployment
# Both TanStack and SvelteKit apps with shared PostgreSQL
#
# Secrets are injected via environment variables from the deployment platform.
# No .env file is used. All ${VAR:?...} references must be set externally.

name: SeventySixCommerce-prod

services:
  # PostgreSQL — shared database for both apps
  postgres:
    image: postgres:18-alpine
    container_name: SeventySixCommerce-postgres-prod
    volumes:
      - ssxc_pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${SSXC_DB_USER:?SSXC_DB_USER must be set}
      POSTGRES_PASSWORD: ${SSXC_DB_PASSWORD:?SSXC_DB_PASSWORD must be set}
      POSTGRES_DB: SeventySixCommerce
      PGDATA: /var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${SSXC_DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - SeventySixCommerce-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # TanStack Start app
  tanstack:
    image: ghcr.io/${GITHUB_OWNER:?GITHUB_OWNER must be set}/SeventySixCommerce-tanstack:latest
    container_name: SeventySixCommerce-tanstack-prod
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://${SSXC_DB_USER}:${SSXC_DB_PASSWORD}@postgres:5432/SeventySixCommerce
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:?STRIPE_SECRET_KEY must be set}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:?STRIPE_WEBHOOK_SECRET must be set}
      PRINTFUL_API_KEY: ${PRINTFUL_API_KEY:?PRINTFUL_API_KEY must be set}
      PRINTFUL_WEBHOOK_SECRET: ${PRINTFUL_WEBHOOK_SECRET:?PRINTFUL_WEBHOOK_SECRET must be set}
      BREVO_API_KEY: ${BREVO_API_KEY:?BREVO_API_KEY must be set}
      BASE_URL: ${TANSTACK_BASE_URL:-https://SeventySixCommerce-react.seventysixsandbox.com}
      MOCK_SERVICES: ${MOCK_SERVICES:-false}
      SEVENTYSIX_API_URL: ${SEVENTYSIX_API_URL:-}
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/api/healthz" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - SeventySixCommerce-network
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # SvelteKit app
  sveltekit:
    image: ghcr.io/${GITHUB_OWNER:?GITHUB_OWNER must be set}/SeventySixCommerce-sveltekit:latest
    container_name: SeventySixCommerce-sveltekit-prod
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://${SSXC_DB_USER}:${SSXC_DB_PASSWORD}@postgres:5432/SeventySixCommerce_sveltekit
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      PRINTFUL_API_KEY: ${PRINTFUL_API_KEY}
      PRINTFUL_WEBHOOK_SECRET: ${PRINTFUL_WEBHOOK_SECRET}
      BREVO_API_KEY: ${BREVO_API_KEY}
      BASE_URL: ${SVELTEKIT_BASE_URL:-https://SeventySixCommerce-svelte.seventysixsandbox.com}
      MOCK_SERVICES: ${MOCK_SERVICES:-false}
      SEVENTYSIX_API_URL: ${SEVENTYSIX_API_URL:-}
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/healthz" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - SeventySixCommerce-network
    ports:
      - "127.0.0.1:3001:3001"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

networks:
  SeventySixCommerce-network:
    driver: bridge

volumes:
  ssxc_pgdata:
