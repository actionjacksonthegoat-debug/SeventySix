<div class="svelte-dashboard">
	<app-page-header
		icon="code"
		title="SvelteKit Dashboard"
		subtitle="Performance and commerce analytics for the SvelteKit sandbox"
	/>

	<div class="dashboard-content">
		<!-- Health Summary Card -->
		<mat-card
			class="health-card"
			data-testid="svelte-health-card">
			<mat-card-header>
				<mat-card-title>
					<mat-icon aria-hidden="true">monitor_heart</mat-icon>
					Health Summary (24h)
				</mat-card-title>
			</mat-card-header>
			<mat-card-content>
				@if (isLoading()) {
				<div class="loading-container">
					<mat-spinner diameter="32"></mat-spinner>
				</div>
				} @else {
				<div class="log-counts">
					<div
						class="count-item warning"
						data-testid="svelte-warnings">
						<mat-icon aria-hidden="true">warning</mat-icon>
						<span class="count">{{ warningCount() }}</span>
						<span class="label">Warnings</span>
					</div>
					<div
						class="count-item error"
						data-testid="svelte-errors">
						<mat-icon aria-hidden="true">error</mat-icon>
						<span class="count">{{ errorCount() }}</span>
						<span class="label">Errors</span>
					</div>
				</div>
				}
			</mat-card-content>
			<mat-card-actions>
				<a
					mat-stroked-button
					[routerLink]="logsRoute"
					aria-label="View SvelteKit logs">
					<mat-icon aria-hidden="true">article</mat-icon>
					View Logs
				</a>
			</mat-card-actions>
		</mat-card>

		<!-- Grafana Dashboard Tabs -->
		<mat-tab-group data-testid="svelte-dashboard-tabs">
			<mat-tab label="Performance">
				<ng-template matTabContent>
					<div class="tab-content">
						<app-grafana-dashboard-embed
							[dashboardUid]="performanceDashboardUid"
							title="SvelteKit Performance"></app-grafana-dashboard-embed>
					</div>
				</ng-template>
			</mat-tab>

			<mat-tab label="Commerce">
				<ng-template matTabContent>
					<div class="tab-content">
						<app-grafana-dashboard-embed
							[dashboardUid]="commerceDashboardUid"
							title="SvelteKit Commerce"></app-grafana-dashboard-embed>
					</div>
				</ng-template>
			</mat-tab>
		</mat-tab-group>
	</div>
</div>
