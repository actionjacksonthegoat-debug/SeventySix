<app-page-header title="TanStack Dashboard" />

<div class="dashboard-layout">
	<mat-tab-group>
		<mat-tab label="Performance">
			<ng-template matTabContent>
				<div class="tab-content full-height">
					<app-grafana-dashboard-embed
						[dashboardUid]="performanceDashboardUid"
						title="TanStack Performance" />
				</div>
			</ng-template>
		</mat-tab>
		<mat-tab label="Commerce">
			<ng-template matTabContent>
				<div class="tab-content full-height">
					<app-grafana-dashboard-embed
						[dashboardUid]="commerceDashboardUid"
						title="TanStack Commerce" />
				</div>
			</ng-template>
		</mat-tab>
	</mat-tab-group>
</div>
