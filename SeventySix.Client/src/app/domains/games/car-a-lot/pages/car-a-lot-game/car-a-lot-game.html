<div class="game-container full-width-page">
	@if (isLoading()) {
		<app-game-loading
			[gameName]="gameName"
			[gameIcon]="gameIcon" />
	}
	<app-babylon-canvas (sceneReady)="onSceneReady($event)" />
	<app-fullscreen-toggle (fullscreenChange)="isFullscreen.set($event)" />
	<app-driving-hud />
	<app-mobile-controls />
	<app-color-selector
		(startGame)="onStartGame()"
		(kartColorChange)="onKartColorChange($event)"
		(characterChange)="onCharacterChange($event)" />
</div>
