<div class="game-loading"
	role="status"
	aria-busy="true"
	aria-live="polite">
	<span class="game-loading-icon">{{ gameIcon() }}</span>
	<h2 class="game-loading-title">{{ gameName() }}</h2>
	<div class="game-loading-spinner"
		aria-hidden="true"></div>
	<p class="game-loading-text">Loading...</p>
</div>
