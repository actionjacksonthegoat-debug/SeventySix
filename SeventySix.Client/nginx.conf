worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Hide nginx version in Server header and error pages (L2)
    server_tokens off;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # Upstream with keepalive connections to the API backend.
    # Reuses TCP connections across requests, reducing handshake overhead.
    # The 'api' hostname is resolved via Docker Compose internal DNS (127.0.0.11).

    # Auth verification cache for nginx auth_request subrequests.
    # Observability UIs (Grafana, Jaeger, Prometheus) fire many sub-requests per page load.
    # Caching the auth result avoids a DB round-trip on every JS/CSS/API request.
    proxy_cache_path /tmp/nginx_auth_cache levels=1:2 keys_zone=auth_cache:1m max_size=10m inactive=60s;

    upstream api_backend {
        server api:8080;
        keepalive 16;
    }

    upstream grafana_backend {
        server grafana:3000;
        keepalive 4;
    }

    upstream jaeger_backend {
        server jaeger:16686;
        keepalive 4;
    }

    upstream prometheus_backend {
        server prometheus:9090;
        keepalive 4;
    }

    # Conditionally set Connection header based on whether client is upgrading to WebSocket.
    # Without this map, proxy_set_header Connection "upgrade" is always sent, even for
    # regular HTTP requests, which breaks keepalive on the upstream connection.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    server {
        listen 8080;
        http2 on;
        server_name localhost;
        root /usr/share/nginx/html/browser;
        index index.html;

        # Content-hashed JS/CSS assets are safe to cache forever — filenames change on rebuild.
        # Match Angular's hashed entry files (main-*, styles-*) as well as split chunks.
        # Security headers are repeated in every location block because nginx add_header does
        # NOT inherit into child locations that define their own add_header directives (C4).
        location ~* "^/[^/]+-[a-zA-Z0-9]{8,}\.(js|css)$" {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "0" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), fullscreen=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), sync-xhr=(), usb=(), xr-spatial-tracking=()" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https:; connect-src 'self' https://cloudflareinsights.com https://static.cloudflareinsights.com https://github.com; frame-src 'self'; frame-ancestors 'self'; worker-src 'self' blob:; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;
        }

        # App shell metadata should always revalidate so deploys are picked up immediately.
        location ~* ^/(ngsw\.json|ngsw-worker\.js|manifest\.webmanifest)$ {
            expires -1;
            add_header Cache-Control "no-cache";
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "0" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), fullscreen=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), sync-xhr=(), usb=(), xr-spatial-tracking=()" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https:; connect-src 'self' https://cloudflareinsights.com https://static.cloudflareinsights.com https://github.com; frame-src 'self'; frame-ancestors 'self'; worker-src 'self' blob:; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;
        }

        # Images and fonts are versioned separately — safe to cache long-term.
        location ~* \.(jpg|jpeg|png|gif|ico|woff|woff2|ttf|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "0" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), fullscreen=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), sync-xhr=(), usb=(), xr-spatial-tracking=()" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https:; connect-src 'self' https://cloudflareinsights.com https://static.cloudflareinsights.com https://github.com; frame-src 'self'; frame-ancestors 'self'; worker-src 'self' blob:; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;
        }

        # Reverse proxy API calls through the Docker internal network.
        # The Angular client uses apiUrl: '/api/v1' (relative), so all API requests
        # arrive at this nginx instance. This block forwards them to the API container
        # via the Docker Compose network, eliminating cross-origin issues.
        location /api/ {
            proxy_pass http://api_backend;

            # HTTP/1.1 with empty Connection header enables upstream keepalive
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Hardcode 'https' — Caddy always terminates TLS before reaching nginx.
            # Using $scheme would send 'http' (Caddy→nginx is plain HTTP), causing
            # the API's SmartHttpsRedirectionMiddleware to issue a 302 redirect loop.
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;

            # Buffer API responses to free upstream connections faster
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 4 32k;
        }

        # Angular routing - redirect all requests to index.html
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate, proxy-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "0" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), fullscreen=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), sync-xhr=(), usb=(), xr-spatial-tracking=()" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https:; connect-src 'self' https://cloudflareinsights.com https://static.cloudflareinsights.com https://github.com; frame-src 'self'; frame-ancestors 'self'; worker-src 'self' blob:; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;
        }

        # ─── Internal auth subrequest endpoint (nginx auth_request) ───
        # Called by nginx before proxying to observability backends.
        # Validates the X-Refresh-Token cookie via the API and confirms Admin role.
        # Returns 200 (allow) or 401 (deny). Body is discarded by auth_request.
        location = /internal/verify-admin {
            internal;
            proxy_pass http://api_backend/api/v1/auth/verify-admin;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Hardcode 'https' — Caddy always terminates TLS before reaching nginx.
            # Without this, SmartHttpsRedirectionMiddleware returns 307 (non-HTTPS),
            # and auth_request converts any non-2xx/401/403 status to 500.
            proxy_set_header X-Forwarded-Proto https;

            # Cache auth responses to avoid DB hits on every static asset request.
            # Grafana alone loads 20+ resources per page; without caching, each triggers
            # a subrequest → token validation → DB query.
            proxy_cache auth_cache;
            proxy_cache_key "$http_cookie";
            proxy_cache_valid 200 30s;
            proxy_cache_valid 401 403 5s;
        }

        # 401 error handler for observability endpoints — returns JSON error
        location @observability_denied {
            default_type application/json;
            return 401 '{"error":"Admin authentication required","detail":"You must be logged in as an Admin to access observability tools."}';
        }

        # ─── Observability reverse proxies (auth_request-protected) ───
        # All observability UIs require a valid admin session (verified via refresh token cookie).
        # Non-admin or unauthenticated users receive 401.

        # Grafana — reverse proxy to internal container
        # Use ^~ so generic static regex locations do not intercept /grafana/public/*
        # requests. Those assets must be served by Grafana, not the Angular static root.
        # Serves under /grafana/ sub-path; Grafana configured with GF_SERVER_SERVE_FROM_SUB_PATH=true
        location ^~ /grafana/ {
            auth_request /internal/verify-admin;
            error_page 401 = @observability_denied;

            # Strip upstream security headers that conflict with iframe embedding.
            # Grafana sets X-Frame-Options based on GF_SECURITY_ALLOW_EMBEDDING, but we
            # enforce consistent policy at the nginx layer regardless of upstream config.
            proxy_hide_header X-Frame-Options;

            # Re-apply explicit frame protections for same-origin embedding.
            add_header X-Frame-Options "SAMEORIGIN" always;

            proxy_pass http://grafana_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # WebSocket support for Grafana live features — uses $connection_upgrade map
            # to send Connection: "upgrade" only when client requests a WebSocket upgrade,
            # and Connection: "" (keepalive) for normal HTTP requests.
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
        }

        # Jaeger UI — reverse proxy to internal container
        location /jaeger/ {
            auth_request /internal/verify-admin;
            error_page 401 = @observability_denied;

            proxy_pass http://jaeger_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
        }

        # Prometheus UI — reverse proxy to internal container
        location /prometheus/ {
            auth_request /internal/verify-admin;
            error_page 401 = @observability_denied;

            proxy_pass http://prometheus_backend/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
        }
    }
}
