# PostgreSQL Host-Based Authentication Configuration
# Enforces mTLS: all remote connections require SSL + verified client certificate
#
# TYPE     DATABASE  USER  ADDRESS  METHOD
# ─────────────────────────────────────────────────────────────────────
# Local socket — healthcheck and admin (no SSL needed for unix socket)
local      all       all            trust
# Remote SSL connections — password auth + mandatory client certificate verification
hostssl    all       all   all      scram-sha-256 clientcert=verify-ca
# Reject all non-SSL remote connections
hostnossl  all       all   all      reject
