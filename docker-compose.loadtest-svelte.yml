# docker-compose.loadtest-svelte.yml
# Load Test Environment for SeventySixCommerce SvelteKit
# Usage: docker compose -f docker-compose.loadtest-svelte.yml up -d
#
# Port Allocation (isolated from dev, E2E, and Angular load tests):
# - SvelteKit App: 3021 (dev: 3001, E2E: 3011)
# - PostgreSQL: 5442 (dev: 5439, E2E: 5440)

name: seventysixcommerce-sveltekit-loadtest

services:
  # PostgreSQL — Load Test Database
  postgres-loadtest-svelte:
    image: postgres:18-alpine
    container_name: ssxc-svelte-postgres-loadtest
    ports:
      - "127.0.0.1:5442:5432"
    environment:
      POSTGRES_USER: ssxc_loadtest
      POSTGRES_PASSWORD: ssxc_loadtest_password
      POSTGRES_DB: seventysixcommerce_sveltekit_loadtest
      PGDATA: /var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ssxc_loadtest -d seventysixcommerce_sveltekit_loadtest" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ssxc-svelte-loadtest-network

  # Database Init — Push schema and seed data
  db-init:
    build:
      context: ./ECommerce
      dockerfile: seventysixcommerce-sveltekit/Dockerfile
      target: db-init
    container_name: ssxc-svelte-db-init-loadtest
    environment:
      DATABASE_URL: postgresql://ssxc_loadtest:ssxc_loadtest_password@postgres-loadtest-svelte:5432/seventysixcommerce_sveltekit_loadtest
    depends_on:
      postgres-loadtest-svelte:
        condition: service_healthy
    networks:
      - ssxc-svelte-loadtest-network

  # SvelteKit App — Production build for load testing
  sveltekit-loadtest:
    build:
      context: ./ECommerce
      dockerfile: seventysixcommerce-sveltekit/Dockerfile
    container_name: ssxc-svelte-app-loadtest
    ports:
      - "127.0.0.1:3021:3001"
    environment:
      DATABASE_URL: postgresql://ssxc_loadtest:ssxc_loadtest_password@postgres-loadtest-svelte:5432/seventysixcommerce_sveltekit_loadtest
      MOCK_SERVICES: "true"
      NODE_ENV: production
      BASE_URL: http://localhost:3021
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres-loadtest-svelte:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider http://localhost:3001/healthz || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ssxc-svelte-loadtest-network

networks:
  ssxc-svelte-loadtest-network:
    driver: bridge
