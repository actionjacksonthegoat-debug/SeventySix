services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: seventysixcommerce
      POSTGRES_PASSWORD: seventysixcommerce_dev
      POSTGRES_DB: seventysixcommerce
    ports:
      - '5438:5432'
    volumes:
      - ssxc_tanstack_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U seventysixcommerce']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  ssxc_tanstack_pgdata:
